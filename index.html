 best:"Respect the wish, manage the risk, and watch him like cargo that can shift. Work genuinely can steady a man — but choose the work: daylight, in company, away from heights, the rail at night, and machinery that punishes a wandering mind. Make connectivity your first aid: arrange real phone time, even via the office if bandwidth is tight. Brief the Bosun and one trusted shipmate for quiet companionship, not surveillance theater. Check him yourself daily — short, human, no clipboard. And know your welfare contacts: many flags and companies run 24/7 seafarer support lines. The rail moment is why none of this is optional.",
 worst:"Taking 'better for my head' at face value and changing nothing — the rail already voted on that — or the opposite: confining him to his cabin 'to rest,' which locks a grieving man alone with the worst company available, his own thoughts. Isolation is the multiplier in most shipboard self-harm tragedies.",
 psych:"Routine genuinely anchors a mind in crisis; his instinct is not wrong. But grief comes in waves, and the motionless figure at the rail is what a wave looks like from outside. Structured work plus engineered human contact lets the routine help while removing the moments where a wave meets an opportunity.",
 lesson:"Let work be medicine, but you control the dosage and the environment. Connectivity, companionship, and quiet daily eyes-on are the watchkeeping a grieving man is owed.",
 example:"Seafarer mental-health studies put suicide among the leading causes of death at sea, with personal crisis plus isolation the recurring pattern. Organizations like ISWAN run round-the-clock helplines precisely for the nine days this man has to cross."},

{cat:9, title:"Crew complains the food budget is being skimmed",
 situation:"Three crew members separately hint the cook is economizing suspiciously — shrinking portions, dropping quality — and the messman whispers about provisions sold ashore last port. Morale sags at every meal. The cook is the Master longtime shipmate.",
 best:"Facts before theories, and the Master before everything. This is potentially theft, morale poison, and a loyalty minefield at once — so move on paper: provision inventory against delivery notes, victualling accounts, consumption versus crew numbers. Quietly, without announcing an investigation. Then take whatever the numbers say to the Master privately — his friendship makes briefing him early essential, not optional: 'Captain, I am seeing discrepancies; better we resolve this before it resolves itself in the mess room.' If the books are clean, fix the actual food problem — menus, budget timing, supplier quality. If they are not, it goes formal regardless of friendships.",
 worst:"Confronting the cook on rumor — accusing the Master friend of theft on whispers is professional suicide if the books are clean — or shelving it because the politics are awkward. Food is the most-watched fairness indicator aboard; a crew convinced their meals are being stolen is a crew at the edge of formal complaints, ITF calls, and ugly inspections.",
 psych:"Food sits at the bottom of the hierarchy of needs and the top of the symbolism chart: skimmed meals read as contempt from above. Meanwhile the Master bond means any move perceived as ambush triggers protection of the friend, not examination of the facts. Sequencing — evidence first, Master second, action third — is the entire game.",
 lesson:"Where money, morale, and the Master friend intersect, lead with auditable facts and brief upward early. Rumors are a reason to count tins, not to make accusations.",
 example:"Victualling fraud appears regularly in P&I and ITF case files, and so does its shadow: crews whose complaints about food festered into full industrial disputes in port. The ships that resolved it quietly all started the same way — with an inventory, not an argument."},

{cat:10, title:"Port official invents deficiencies, hints at an express fee",
 situation:"A boarding officer in a difficult port 'finds' that your garbage record book has format problems and your certificates need a stamp that does not exist. He sighs: clearance may take three or four days. Unless, of course, an arrangement is possible.",
 best:"Polite, dense, and procedural — be expensive to shake down. 'I want to resolve every finding properly. Please show me the regulation for this stamp so I can comply exactly.' Write everything down visibly: his name, time, each claimed deficiency — documentation changes the economics of extortion. Decline the arrangement without theater: 'Company policy and my flag's law — I cannot. What is the official procedure?' Then escalate fast and wide: Master, agent (often the local fixer for legitimate paths), office, P&I correspondent. Companies signed to anti-corruption networks have hotlines for exactly this hour.",
 worst:"Paying — once a ship pays, it enters the database of ships that pay; next call the price doubles and the colleagues queue — or going to war: shouting accusations at an official who controls your clearance, in his port, on his paperwork. Anger gives him legitimate-looking grounds for the delay he was only pretending to threaten.",
 psych:"This is a business model, not a misunderstanding: invented problems sold against the value of your schedule. The seller needs speed and quiet. Visible documentation, polite stubbornness, and escalation make the transaction slow, loud, and risky — at which point an invented deficiency stops being worth his time.",
 lesson:"Defeat petty extortion with paperwork, patience, and rapid escalation through agent, office, and P&I. The objective is to be the most expensive, best-documented target in the anchorage.",
 example:"The Maritime Anti-Corruption Network reports thousands of demand incidents annually — and measurable drops in ports where ships systematically document and report. Masters note the pattern: ships that politely refuse and call their network usually clear within hours, not the threatened days."},

{cat:10, title:"Agent suggests gifts for surveyors to ensure a friendly draft survey",
 situation:"Before the final draft survey on a tight cargo, the agent mentions casually: 'The surveyor here can read drafts flexibly. A carton of cigarettes each, maybe a bottle, and the figures will be friendly. Standard practice.'",
 best:"Refuse in a way that closes the door without burning the agent. 'We will take the figures the marks show — I will be on the boat reading them with him.' Then make your own accuracy bulletproof, because a refused surveyor sometimes reads unfriendly instead: do the survey alongside him personally, verify densities, photograph every mark, run your own complete calculation. Report the approach to the Master and office per anti-corruption policy — small bribes are the entry ramp to the large ones, and companies track ports where the ramp exists.",
 worst:"A couple of cartons to keep things smooth. You have just made the ship figures negotiable merchandise — this survey reads friendly, but the precedent is permanent: every future survey here starts with a price, and the surveyor now owns a fact about your ship that you would not want repeated. Cheap bribes are never cheap; they are subscriptions.",
 psych:"'Standard practice' and 'everyone does it' are the universal solvents of small corruption — they reframe a bribe as a custom, making refusal feel rude rather than right. The counter is making your independence procedural, not personal: it is not that you distrust this surveyor; it is that you read marks yourself, everywhere, always.",
 lesson:"Buy accuracy with presence and mathematics, never with cartons. Attend every survey, verify every figure, and let your thoroughness be the thing surveyors know your ship for.",
 example:"Draft survey manipulation features in cargo shortage arbitrations worldwide; the gap between bought figures and real ones surfaces at the discharge port as a claim with the ship's name on it. Officers who attend and recalculate personally almost never appear in those files."},

{cat:10, title:"Crew member caught arranging to smuggle cigarettes for a port contact",
 situation:"A routine store check finds four cartons of undeclared cigarettes hidden in the steering gear room. Quiet inquiry reveals an AB agreed to carry them for a stevedore contact 'as a favor.' Customs in this port is famously aggressive.",
 best:"Treat it as the ship-level threat it is, not a tobacco matter. Secure the goods, document the find — photos, location, witnesses — and report to the Master immediately; concealment by officers converts his problem into theirs. The Master decides on declaring to customs, guided by the office and P&I — in aggressive ports, proactive declaration with documentation usually beats discovery by a sweep team. The AB goes through the formal disciplinary process, and his 'favor' gets unpacked carefully: who asked, was there pressure or payment, is he a one-time fool or a link in something organized? Then close the hole: store checks, gangway control, and a blunt crew briefing on what smuggling convictions do to ships and licenses.",
 worst:"Tossing the cartons over the side and having a quiet word — if the arrangement had other layers or other carriers, you have destroyed evidence while leaving the network aboard. Worse still is the sympathetic shrug: a vessel detained for smuggling makes the 'favor' everyone's catastrophe — fines against the ship, crew interrogations, a flag-state file, and a port reputation that outlives every man aboard.",
 psych:"Port contacts recruit through smallness: a favor, cigarettes, nothing serious — testing both the man and the ship's controls. A carrier who succeeds once gets asked for more, with leverage attached the second time. The recruitment chain breaks only where the first favor meets formal consequence and the contact learns this ship's crew is a dead end.",
 lesson:"Smuggling aboard is never one man's private risk — the ship, the Master's ticket, and every shipmate's clearance are in the parcel. Full procedure, full transparency upward, and make the lesson crew-wide.",
 example:"Customs authorities in hot-spot ports regularly fine and detain vessels for crew contraband, and case files show the pattern: it starts with cartons carried as favors and ends with organized concealment. Ships with visible store-check routines simply stop being approached."},

{cat:11, title:"Superintendent berates you on speakerphone in front of your officers",
 situation:"The vessel missed a survey window — partly office planning, partly weather. The superintendent calls the ship office on speaker mid-meeting and unloads on you personally: incompetent planning, 'what do they teach Chief Officers now,' fix it or explain to the fleet manager.",
 best:"Refuse the public arena without refusing him. Calm, brief, in front of the room: 'Understood — I will call you back in ten minutes with the full timeline.' Take it off speaker; that single move ends the performance. In the private call, lead with facts, not feelings: the planning sequence, the weather window, what the ship controlled and what it did not, and your recovery plan with dates. Send the same as a tidy email — visible to the Master — so the record contains your account, not just his outburst. If the public abuse becomes a pattern, address it directly with him first, professionally: 'Criticize me with anything you have, but to my face, not over a speaker to my juniors.'",
 worst:"Fighting him on speaker — your officers watch their two seniors brawl, and you hand him quotable insubordination — or absorbing it in wet silence, which teaches your wardroom that this is how their Mate can be treated, and therefore how they can expect to be treated when their turn comes.",
 psych:"Public blasting is usually pressure rolling downhill: the superintendent has a fleet manager on his own neck and needs a visible culprit. The speaker is the point — the audience converts criticism into theater. Removing the audience removes the show; documented facts then quietly reverse the story without you ever calling him wrong in public.",
 lesson:"Move public attacks to private ground immediately, answer drama with a written timeline, and defend your dignity once, clearly, through the man himself. Your officers learn how to be treated by watching what you accept.",
 example:"Fleet-office veterans recognize the pattern: the officer who replies with a calm factual email an hour after the explosive call usually finds the next call apologetic — speakerphone rage rarely survives contact with a documented timeline."},

{cat:11, title:"You disagree with the Master anchoring decision — and you are probably right",
 situation:"The Master intends to anchor in a roadstead you know from a previous ship: poor holding, foul ground patches, and a forecast wind veer that will put the anchorage on a lee shore by morning. He has announced it on the bridge already. You have perhaps an hour.",
 best:"Private, specific, and structured — give him room to change course without cost. In the chartroom, not the bridge: 'Captain, before we commit — I have history with this roadstead from the [ship]: dragged twice in the foul patch, and tonight's veer puts us on a lee shore by 0400. May I show you?' Lay out the chart, the forecast, your alternative anchorage or steaming pattern. Then offer the face-saving frame: 'Updated forecast just came in — grounds enough to adjust?' If he still proceeds, request the precautions you can own — maximum scope, engines on notice, tightened anchor watch, your own presence at the sharp hours — and log your input professionally.",
 worst:"Voicing doubts on the open bridge after his announcement — now changing course means public retreat, and Masters dig in exactly there — or saying nothing because he is the Master. A dragging ship on a lee shore at 0400 will not be comforted by how respectful your silence was.",
 psych:"The announcement is the trap: a decision spoken before the bridge team carries the Master's face with it. Private dissent with new information ('updated forecast') lets him change his mind as an update, not a defeat. Your local knowledge is gold, but only if delivered in packaging he can accept.",
 lesson:"Challenge decisions, never dignity. Private setting, specific evidence, a ready alternative, and a face-saving exit — that is how a Chief Officer is owed to disagree, and how disagreement actually changes outcomes.",
 example:"Dragging anchors onto lee shores fill casualty summaries every storm season, and inquiries keep finding an officer who 'had concerns' that never crossed the chartroom table in usable form. The Costa Concordia inquiry made the wider point brutal: bridge teams that cannot challenge are passengers."},

{cat:11, title:"Office assigns you a task that should be the Master's — he notices",
 situation:"The fleet office emails you directly: prepare and send the voyage performance analysis and crew appraisals — items traditionally the Master's. He sees the email chain and turns cold: 'Running the ship past me now? Maybe the office prefers your reports.'",
 best:"Repair the bridge before answering the office. Go to him directly, no defensiveness: 'Captain, I did not ask for this and I will not work past you. Here is how I will answer it.' Then reply to the office with him visible in copy: 'Preparing as requested — routing through the Master for review and signature as per shipboard practice.' Let him review, adjust, and send. You have absorbed the work, returned the authority, and shown the office the proper channel without rejecting their tasking. If the office persists in bypassing him, that is the Master's battle to fight with them — your job is to make sure the bypass never has your fingerprints on it.",
 worst:"Just doing the task and sending it direct — efficient, and a declaration of war you did not mean to sign; every cold week afterward was purchased by that one send button — or theatrically refusing the office to prove loyalty, which makes you look difficult to the people who write your next promotion and solves nothing about the channel.",
 psych:"The Master's chill is not vanity; office bypass is how Masters get hollowed out, and he has seen ambitious Chief Officers help it happen. Your visible re-routing answers the only question he actually has: is my Mate a channel around me or a wall beside me? Answer it with the email's CC line, not with assurances.",
 lesson:"When the office reaches past the Master to you, do the work and route the authority back through him — visibly. Your loyalty is proven in headers and signatures, not in words.",
 example:"Experienced Masters trade stories of being managed around via the Chief Officer — and remember for entire careers which Mates played along and which ones walked the email straight to the cabin. The second kind sail with them again, with glowing appraisals attached."}
];

/* ============ POWER & INFLUENCE ============ */
const POWER = [
 { t:"Legitimate Power — The Rank on Your Shoulder", icon:"I",
   d:"This is power from your position. The company appointed you. The flag state licensed you. The rules give your rank specific duties. Every crew member signed articles agreeing to obey it. It is the skeleton that holds shipboard order together.",
   use:["Routine orders and watch organization — normal work needs no persuasion, just clear instructions.","Safety-critical orders, where obedience must be immediate and total.","Closing a discussion after hearing everyone: 'I have heard all views — here is what we do.'","Formal discipline, which only the office of your rank can carry out."],
   avoid:["As your first tool in every situation. An officer who always points at his stripes shows he has nothing else.","To win technical arguments. 'Because I am the Chief Officer' is not a stability calculation.","To silence bad news or disagreement — do this and the truth stops reaching you.","When you need extra effort and heart. Rank can command hands, never enthusiasm."],
   sea:"A new Chief Officer joins with 100% rank power and 0% of everything else. The first month decides the rest: either you build the other five powers, or you spend the contract leaning on the only one that came with the epaulettes." },
 { t:"Expert Power — Skill That Speaks First", icon:"II",
   d:"This is authority earned by being good at the job: your cargo numbers are right, your lashing plan survives the storm, your advice works. At sea this is the most respected power of all. Seafarers forgive many faults in an officer who clearly knows his work.",
   use:["In technical disputes — walk through the numbers in front of everyone and let the math persuade.","To win early respect on a new ship: solve one visible, annoying problem well in week one.","To teach juniors. Knowledge shared multiplies loyalty; knowledge hidden creates resentment.","With the office — superintendents trust Mates whose data is always reliable."],
   avoid:["Outside your real field. Bluffing about the engine side burns the credit you earned on deck.","As a weapon to embarrass people. 'Did they teach you nothing?' turns respect into fear.","As an excuse to do everything yourself. The expert who never delegates builds a team that can do nothing.","When the problem is emotional, not technical. A grieving AB needs your humanity, not your knowledge."],
   sea:"PSC inspectors measure you in minutes. An officer who knows his own SMS and answers without searching gets a shorter, softer inspection. Skill shown openly stops challenges before they start." },
 { t:"Referent Power — Being Someone Worth Following", icon:"III",
   d:"This is influence from character. The crew follows you because of who you are: fair, calm, consistent, loyal to your people. It is the slowest power to build, the strongest under pressure, and the only one that works at 0300 when nobody is watching.",
   use:["In a crisis. Referent power is the reason a crew stays calm because YOU are calm.","When you need effort beyond the contract: the extra hold sweep, the rough-weather lashing check.","To hold a mixed-nationality crew together where rules cannot cover every gap.","To set the safety culture. Crews copy what respected leaders DO, not what posters say."],
   avoid:["Do not confuse it with friendship. Chasing popularity by relaxing standards destroys the respect it pretends to be.","Never trade it for short-term convenience. One visible double standard can erase a year of fairness.","Do not rely on it alone in discipline. Affection without procedure collapses in an office inquiry."],
   sea:"Ask any AB about the best Mate he ever sailed with. He will not mention certificates. He will say: 'He was fair. Same rules for everyone. He stood up for us in port.' That sentence is referent power — and it travels from ship to ship through the crewing grapevine." },
 { t:"Informational Power — Controlling the Picture", icon:"IV",
   d:"This is power from holding, shaping, and timing information: voyage orders, office mail, inspection findings, what the charterer really said. The person who shapes the picture shapes the decision.",
   use:["Brief the crew before rumors do it for them. The first version of a story usually wins.","Translate office pressure into shipboard language — pass the facts, not the panic.","Prepare the Master for meetings. The Mate who delivers good information becomes hard to replace.","In port talks — know the charter terms and local customs before the meeting starts."],
   avoid:["Hiding information to make yourself important. It works for a week; then the team learns to work around you.","Telling half-truths that later surface as lies. On a ship, everything surfaces.","Using private knowledge to embarrass people publicly.","Withholding ANY safety-relevant information, for any reason. That line is absolute."],
   sea:"When the schedule changes, the crew mood is decided by who tells them and how. A Mate who announces: 'Discharge port changed — here is what it means for your reliefs, here is what we know and do not know' — owns the story. Silence hands it to the mess room." },
 { t:"Reward & Coercive Power — Carrot and Stick", icon:"V",
   d:"These are the levers of consequence: overtime, shore leave, appraisals, recommendations — and warnings, logbook entries, dismissal. Both work. Both are dangerous. Reward loses value if overused; punishment poisons if misused.",
   use:["Reward: recognize specific actions fast and publicly. 'Good job' is noise. 'Your re-check in hold 3 caught a real problem' is signal.","Reward: write appraisals honestly — they are the most powerful lever you hold over careers. Use them with integrity.","Punishment: only for clear, documented breaches, after softer means failed. Always by procedure, never by emotion.","Punishment: the credible POSSIBILITY matters more than the use. A fair officer who followed through once rarely needs to again."],
   avoid:["Rewarding to buy friendship. Crews smell it instantly and the currency dies.","Punishing in anger or in public. Humiliation turns one problem man into a hostile group.","Threats you cannot or will not execute. Nothing kills authority faster than a bluff that gets called.","Using overtime or shore leave as a private favor system along national or friendship lines."],
   sea:"Watch what happens to a Mate who gives the good overtime only to his countrymen: within a month the rest of the deck works strictly to rule, and every job needs a formal order. Overused stick-power produces minimum compliance — the most expensive labor on Earth." },
 { t:"Reputation — The Power That Arrives Before You", icon:"VI",
   d:"This is the compound interest of all the other powers. Shipping is a small world of crewing agencies, fleet grapevines, and superintendent networks. Your reputation boards every ship before you and signs off after you. Guard it like the most valuable cargo you will ever carry.",
   use:["Build it on two or three simple traits: fair, calm, knows cargo cold. Simple reputations travel best.","Let others speak for you. A Bosun telling the new crew 'the Mate is strict but fair' is worth ten of your speeches.","Defend it immediately when attacked — with facts and documents, never with counter-rumors.","Spend it deliberately. Vouching for a man or pushing back on the office draws from the account; keep deposits ahead of withdrawals."],
   avoid:["Never sacrifice it for one voyage's convenience. A single falsified record outlives ten years of honest ones.","Do not manage the image instead of the substance. The crew lives with you 24/7 and detects acting within weeks.","Avoid feuds. In reputation wars both sides lose — observers only remember that there was a war."],
   sea:"Masters request Mates by name. Offices fast-track officers whose names superintendents recognize. Your promotion interview is mostly finished before it begins — conducted in your absence, by everyone you ever sailed with." }
];

/* ============ CONFLICT RESOLUTION CENTER ============ */
const CONFLICT = {
 frameworks:[
  { t:"The 5-Step Shipboard Resolution Ladder", b:"1) <b>Pause.</b> Never solve a conflict at the moment it explodes. Separate the men and wait 20-30 minutes for tempers to cool. 2) <b>Hear separately.</b> Each man alone, without interruption, while you take notes. 3) <b>Find the interest under the position.</b> 'He took my overtime' is a position. 'I need to know the system is fair' is the interest underneath. 4) <b>Joint meeting with rules.</b> Facts first, one speaker at a time, focus on the future. 5) <b>Agree, write, follow up.</b> A specific behavioral agreement, written down if serious, checked at 48 hours and again at two weeks." },
  { t:"Interests, Not Positions", b:"A position is what a man demands. An interest is WHY he demands it. Two officers fighting over the same maintenance window have clashing positions — but their interests (finish my job, avoid blame for delay) usually fit together fine. Keep asking 'what does this give you?' until you reach something the other side can actually help with. Most shipboard conflicts dissolve at the interest level, because the ship's interest is genuinely shared." },
  { t:"The Behavior–Impact–Expectation Script (BIE)", b:"For correcting one man, use three steps. Name the specific <b>Behavior:</b> 'You left the watch 20 minutes before your relief arrived.' State the <b>Impact:</b> 'The gangway was unmanned in port — an ISPS breach that lands on me and the Master.' Set the <b>Expectation:</b> 'You stay until properly relieved. If there is a relief problem, you bring it to me — you do not solve it by walking off.' No comments about his character, no digging up old history, no audience." },
  { t:"The Graduated Response Ladder", b:"Match the force to the failure: informal word → documented verbal counseling → written warning per the SMS → Master's logbook entry and DPA → repatriation. Skipping steps looks like revenge and fails office review. Refusing to climb when behavior repeats looks weak and teaches the crew that warnings are decoration. The ladder works only if everyone knows you WILL climb it — calmly, reluctantly, and certainly." }

 scripts:[

  { t:"Delivering a formal warning", s:"This is a formal warning under the company disciplinary procedure. It concerns [the specific incident and date]. It will be documented. And I want to be equally clear: this is about the behavior, not about you as a seafarer. The way it closes is simple — it does not happen again." },

 deesc:[
  { t:"Lower your voice, slow your pace", b:"Anger is contagious — and so is calm. When you drop your volume, the other man must quieten to hear you. A slow, steady pace signals that the situation is under control. The leader sets the emotional temperature. Never match an escalation." },
  { t:"Change the geometry", b:"Standing face to face is a fighting position. Move side by side instead — looking at a plan, a screen, the deck. Or sit down. Or walk while talking. Bodies calm down before minds do." },
  { t:"Name the emotion", b:"Say: 'It sounds like you feel this was unfair.' Naming a feeling accurately takes the pressure out of it — the man feels heard, and his brain shifts from fighting to talking. You are not agreeing with him. You are only showing that you see him." },
  { t:"Buy time deliberately", b:"Say: 'I want to think about this properly — we continue at 1400.' Almost no personal conflict at sea needs an instant answer. Time is the cheapest and most underused de-escalation tool on a ship." },
  { t:"Give an exit with dignity", b:"Cornered men fight. Always leave a path where the other man can comply without public shame: 'Let us reset — take the forward station, we talk after stations.' Crews remember for years whether you let a man keep his face." },

 invest:[
  { t:"Secure first, investigate second", b:"Separate the people involved. Treat any injury. Preserve the scene and the evidence — photos, CCTV, logs, work permits — before memories change and the deck gets cleaned. The quality of an investigation is decided in the first hour." },
  { t:"Interview separately, ask open questions, write exact words", b:"Witnesses one by one, soonest first — before the mess room synchronizes their memories. Ask 'walk me through what you saw,' never 'did he hit him first?' Record the words as spoken. For serious cases: signed and dated." },
  { t:"Facts, then findings, then opinion — clearly separated", b:"Your report must show three layers: what is established (CCTV, documents, agreed accounts), what is disputed, and what you conclude. Mixing the three is the most common reason shipboard reports collapse under office or legal review." },

  { t:"Same-day notes beat reconstructed ones", b:"Notes written the same day carry many times the weight of statements written a week later. Carry the notebook. Build the habit. Date everything. Your pocketbook is the most underrated legal instrument on the ship." },

const CASES = [
 {id:"elfaro", ship:"SS El Faro", year:2015, t:"The Storm Nobody Could Question",
  what:"The American cargo ship El Faro sailed from Jacksonville toward Puerto Rico as Hurricane Joaquin formed. The Master chose a route close to the forecast storm track, trusting old weather data and his own judgment. Through the night, junior officers on the bridge saw newer forecasts and grew worried. The voyage data recorder captured their voices: hints, careful suggestions, polite questions — but never a direct, firm challenge. The Master stayed on his route. The ship lost propulsion in the hurricane, flooded, and sank. All 33 aboard died.",
  command:"This was not a weather failure first — it was a speaking-up failure. The officers had the information and the doubts. What they did not have was a bridge culture where a Third Mate could say plainly: 'Captain, this route will kill us — here is the new forecast.' Every hint was deflected, and hints were all they offered. The Master, for his part, had built no system that invited challenge, and fatigue plus commercial schedule pressure filled the silence.",
  lessons:["Doubt that stays polite and vague protects nobody. Train your officers to challenge with structure: facts, recommendation, request for decision.","If you are the senior: the absence of challenge does not mean you are right. It may mean your bridge is afraid.","Old data feels comfortable because it agreed with the plan. Always ask: what does the NEWEST information say?","Schedule pressure is loudest exactly when the weather argument matters most. Write your reasoning down in those moments."]},
 {id:"herald", ship:"MS Herald of Free Enterprise", year:1987, t:"The Open Door and the Sleeping Assumption",
  what:"The ro-ro ferry Herald of Free Enterprise left Zeebrugge with her bow doors open. The assistant bosun, responsible for closing them, was asleep in his cabin. The Chief Officer, required to confirm closure, assumed it was done — the working culture was 'no report means all is well.' Minutes after departure, water flooded the vehicle deck. The ship capsized in about 90 seconds. 193 people died.",
  command:"The famous inquiry phrase was 'a disease of sloppiness' running from top to bottom. The fatal mechanism was negative reporting: silence treated as confirmation. Nobody was assigned to positively report 'doors closed' — and requests from Masters for door indicator lights on the bridge had been mocked by shore management as unnecessary expense. Every layer assumed another layer had it covered.",
  lessons:["Silence is not confirmation. Critical states must be positively reported and acknowledged — closed-loop, every time.","If a check matters, one named person owns it and one named person verifies it. 'Someone' closes no doors.","When the crew asks for a safety improvement and management laughs, that laughter is itself a finding. Document such requests.","Culture sinks ships faster than weather. The deadliest sentence aboard is: we have always done it this way."]},
 {id:"concordia", ship:"Costa Concordia", year:2012, t:"The Showman and the Silent Bridge",
  what:"The cruise ship Costa Concordia, with over 4,200 people aboard, deviated from her planned route to perform a 'salute' — a close, showy pass of Giglio Island. The Master conned the ship personally, navigating by eye at night, while the bridge team watched without challenge. The ship struck rocks, tore open, and drifted aground. The evacuation was delayed and chaotic; the Master left the ship while passengers were still aboard. 32 people died.",
  command:"Two command failures stacked. First: a deviation from the plan for prestige, accepted by an entire bridge team that had been trained into silence around a dominant captain. Officers later admitted they saw the danger building and said nothing usable. Second: when crisis came, the command structure that had suppressed its officers could not suddenly produce initiative — the delay in sounding the alarm and ordering abandonment cost lives that the grounding itself had spared.",
  lessons:["A bridge team that cannot challenge in calm waters will not challenge in danger. The silence is installed long before the rocks.","Deviations from the plan for non-operational reasons — prestige, salutes, shortcuts — deserve the strongest challenge, because no professional logic protects them.","The leader who suppresses initiative inherits a crew with none, on the exact night he needs it most.","Command in crisis is a duty to stay, decide, and direct. Authority and accountability cannot be abandoned together."]},
 {id:"bowmariner", ship:"MT Bow Mariner", year:2004, t:"The Order Nobody Understood — and Nobody Questioned",
  what:"The chemical tanker Bow Mariner exploded off Virginia while the crew, on the Master's order, was cleaning and ventilating cargo tanks that had carried MTBE — opening many tank openings at once, against the most basic rules of tanker safety. Flammable vapor found an ignition source. The ship sank in under 90 minutes; 21 of 27 crew died, including the Master.",
  command:"The investigation found a ship with a rigid, fear-based hierarchy: senior officers of one nationality, junior officers and crew of another, with the juniors trained never to question. The order to open the tanks was contrary to training that every officer aboard had received — yet it was executed without one recorded objection. Fear of the Master outweighed fear of the vapor. The safety management system existed on paper and nowhere else.",
  lessons:["An unsafe order obeyed kills the obeyers too. Crews must know — from your daily behavior — that questioning an unsafe order is duty, not disrespect.","Hierarchies split along nationality lines are double hierarchies: rank plus tribe. They suppress challenge twice as hard. Watch for this on your own ship.","If the SMS lives only in the files, the real procedures are whatever the most feared man says. Audit the gap between paper and deck.","The Master who builds fear builds his own echo chamber — and sails inside it."]},
 {id:"sewol", ship:"MV Sewol", year:2014, t:"Abandon Ship — Except the Order Never Came",
  what:"The South Korean ferry Sewol, overloaded and with cargo poorly secured after repeated improper modifications, capsized during a turn. As the ship heeled and slowly rolled over more than an hour, passengers — mostly schoolchildren — were repeatedly told over the PA to stay in their cabins and wait. The order to evacuate was never effectively given. The Master and several crew were among the first rescued. 304 people died, most of them obeying the instruction to stay put.",
  command:"This is the catastrophic version of decision paralysis: a command team that, facing a decision too big to face, defaulted to the instruction that required nothing of them — wait. The deeper roots were commercial: chronic overloading, ballast removed to carry more cargo, lashings everyone knew were inadequate. Each daily compromise had been survivable; the turn that day asked for the margin that had been sold off piece by piece.",
  lessons:["In a developing disaster, 'wait' is also a decision — usually the worst one. Leaders must decide with the information they have, on the clock the ship sets.","Margins are sold in small, profitable, survivable slices. Your job is to know the total already sold before the day that asks for it.","Evacuation decisions delayed for certainty arrive after the stairways tilt. Drill the early call.","People obey official voices even unto death. That is the weight every PA announcement and every order of yours actually carries."]}

/* ---------- spaced repetition ---------- */
function reviewDue(){
  const due = [];
  S.doneModules.forEach(id => {
    const m = MODULES.find(x=>x.id===id); if (!m) return;
    const d0 = S.moduleDates[id] != null ? S.moduleDates[id] : TODAY;
    m.principles.forEach((p,pi) => {
      const key = id+':'+pi;
      const rec = S.reviews[key];
      const dueDay = rec ? rec.due : d0 + 3;
      if (TODAY >= dueDay) due.push({key, m, p});
    });
  });
  return due;
}

BIND.review = () => {

      const rec = S.reviews[c.key] || {ivl:-1};
      if (ok) { rec.ivl = Math.min((rec.ivl<0?0:rec.ivl)+1, IVLS.length-1); rec.due = TODAY + IVLS[rec.ivl]; }
      else { rec.ivl = Math.max(0, (rec.ivl<0?0:rec.ivl)); rec.due = TODAY + 1; }

    document.getElementById('fGood').onclick = e => { e.stopPropagation(); grade(true); };

  };
  draw();
};

const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function animateDash(){
  const arc = document.getElementById('ringArc');
  if (arc) {
    if (REDUCED) arc.setAttribute('stroke-dashoffset', arc.dataset.off);
    else requestAnimationFrame(()=>requestAnimationFrame(()=>arc.setAttribute('stroke-dashoffset', arc.dataset.off)));
  }
  const els = [document.getElementById('scoreNum'), ...document.querySelectorAll('.cnt')].filter(Boolean);
  els.forEach(el => {
    const v = +el.dataset.v, suf = el.dataset.suf || '';
    if (REDUCED || v === 0) { el.textContent = v + suf; return; }
    const t0 = performance.now(), dur = 900;
    const tick = now => {
      const p = Math.min(1, (now - t0) / dur), e = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(v * e) + suf;
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}
BIND.dash = () => {
  animateDash();
  const btn = document.getElementById('chBtn');
  if (btn) btn.onclick = () => {
    const i = dayIndex(CHALLENGES.length);

/* ---------- SIMULATORS (shared engine + pickers) ---------- */
let curSim = {key:'convo', i:0};
window.runSim = (key, i) => { curSim = {key, i}; show('simrun'); };

function simPicker(key){
  const set = SIM_SETS[key];
  const runs = S.simRuns[key] || [];
  return `${back('tools','Tools')}
  <div class="section-head"><h2>${set.title}</h2><span class="muted small">${runs.length}/${set.scenarios.length} completed</span></div>
  <p class="muted" style="margin-bottom:14px">Each scenario has three decision points with feedback on every choice. Choose one to run — you can repeat any of them.</p>
  <div class="grid">
    ${set.scenarios.map((s,i)=>`<div class="row" onclick="runSim('${key}',${i})">
      <div class="ic mono">${String(i+1).padStart(2,'0')}</div>
      <div class="tx"><b>${s.title}</b><span>${s.intro}</span></div>
      ${runs.includes(i)?'<span class="done">✓</span>':''}
      <span class="chev">›</span></div>`).join('')}
  </div>`;
}
function simView(sim, key){
  return `${back(key, SIM_SETS[key].title)}
  <div class="section-head"><h2>${sim.title}</h2></div>
  <div class="card gold" style="margin-bottom:14px"><p style="color:var(--text-soft);font-size:.93rem">${sim.intro}</p></div>
  <div id="simSteps"></div>
  <div id="simResult"></div>`;
}
function simBind(sim, key, idx){
  let step = 0, score = 0;
  const stepsEl = document.getElementById('simSteps');
  const drawStep = () => {
    const st = sim.steps[step];
    const div = document.createElement('div');
    div.className = 'card fadein'; div.style.marginBottom = '12px';
    div.innerHTML = `<div class="eyebrow">Step ${step+1} of ${sim.steps.length}</div>
      <p style="margin:10px 0;font-size:.93rem;color:var(--text-bright)">${st.p}</p>
      ${st.o.map((o,i)=>`<div class="opt" data-i="${i}">${o.t}</div>`).join('')}
      <div class="fb" style="display:none;margin-top:4px"></div>`;
    stepsEl.appendChild(div);
    div.querySelectorAll('.opt').forEach(el => el.onclick = () => {
      if (div.dataset.locked) return;
      div.dataset.locked = '1';
      const choice = st.o[+el.dataset.i];
      score += choice.v;
      div.querySelectorAll('.opt').forEach(x=>{
        const v = st.o[+x.dataset.i].v;
        if (x===el) x.classList.add(v>=3?'good':(v<=1?'bad':'sel'));
        x.style.cursor='default';
      });
      const fb = div.querySelector('.fb');
      fb.style.display='block';
      fb.innerHTML = `<div class="callout ${choice.v>=3?'best':(choice.v<=1?'worst':'psy')}"><div class="ctitle">${choice.v>=3?'Strong choice':(choice.v<=1?'Costly choice':'Workable, not optimal')}</div>${choice.f}</div>`;
      step++;
      setTimeout(()=> step < sim.steps.length ? drawStep() : finish(), 700);
    });
  };
  const finish = () => {
    const band = sim.bands.find(b=>score>=b.min);
    document.getElementById('simResult').innerHTML = `
      <div class="card gold fadein">
        <div class="eyebrow">Debrief · ${score}/9</div>
        <h3 style="font-family:'Marcellus',serif;color:var(--brass-hi);font-size:1.2rem;margin:6px 0 8px">${band.t}</h3>
        <p style="color:var(--text-soft);font-size:.93rem">${band.b}</p>
        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn ghost" onclick="runSim('${key}',${idx})">Run it again</button>
          <button class="btn primary" onclick="show('${key}')">More scenarios</button>
        </div>
      </div>`;
    document.getElementById('simResult').scrollIntoView({behavior:'smooth'});
    if (!S.simRuns[key]) S.simRuns[key] = [];
    const firstRun = !S.simRuns[key].includes(idx);
    if (firstRun) S.simRuns[key].push(idx);
    if (!S.simsDone.includes(key)) S.simsDone.push(key);
    if (firstRun) { save(); addXP(40,'Scenario complete'); checkBadges(); } else save();
  };
  drawStep();
}
VIEWS.simrun = () => simView(SIM_SETS[curSim.key].scenarios[curSim.i], curSim.key);
BIND.simrun = () => simBind(SIM_SETS[curSim.key].scenarios[curSim.i], curSim.key, curSim.i);

/* =====================================================
   THE 48 LAWS OF POWER — paraphrased, with shipboard
   application and ethical counterpoints. Original
   commentary; not the book text.
   ===================================================== */
const LAWS = [
 {n:1,t:"Never Eclipse the Captain",b:"Make the people above you feel safe and respected. If you make your boss look small, he will quietly work against you. <b>At sea:</b> make the Master look good in front of pilots, surveyors and the office. The person you are tempted to outshine is the person who writes your promotion report."},
 {n:2,t:"Watch Friends Closely, Use Former Rivals",b:"Friends become careless and expect favors. A rival you have won over works harder, because he has something to prove. <b>At sea:</b> do not give key jobs by friendship. And treat the officer you once argued with as a future ally, not a permanent enemy."},
 {n:3,t:"Keep Your Plans Shaded",b:"If you announce your plans early, people can block them. Keep your cards close until the right moment. <b>At sea:</b> in talks with terminals and agents, show your limits last. But the hard rule stands: never hide anything safety-related from your own bridge team."},
 {n:4,t:"Say Less Than Necessary",b:"The more you talk, the more common you sound — and the more you give away. Few words carry more weight. <b>At sea:</b> short clear orders beat long speeches. In a negotiation, silence makes the other side talk — and usually they talk themselves into giving something."},
 {n:5,t:"Guard Your Reputation With Your Life",b:"Reputation is the base of all your power. One crack in it invites every attack. <b>At sea:</b> the fleet grapevine never forgets. If someone attacks your name, answer fast with facts and documents — never with counter-rumors."},
 {n:6,t:"Be Seen — Visibility Is Currency",b:"Work that nobody sees is work that nobody counts. Honest visibility multiplies your influence. <b>At sea:</b> walk the deck, send the clear report, let good work be witnessed. No drama needed — just do not be invisible."},
 {n:7,t:"Credit Games — Know Them, Refuse Them",b:"The original law says: let others do the work, you take the credit. <b>At sea, do the opposite:</b> push credit down to your crew and keep responsibility up with yourself. That builds loyalty. Know this law mainly to recognize the bosses who play it on you."},
 {n:8,t:"Make Others Come to Your Ground",b:"The person who controls the place controls the talk. <b>At sea:</b> hold difficult conversations in your office, with your documents, at your chosen time — not cornered in an alleyway by an agent with a clipboard."},
 {n:9,t:"Win by Showing, Not by Arguing",b:"Arguments create anger even when you win them. Showing proof convinces without a fight. <b>At sea:</b> do not debate the lashing standard — run the calculation, show the broken shackle. Let the evidence give the order for you."},
 {n:10,t:"Quarantine the Mood, Help the Man",b:"Bad moods and bitterness spread like infection. <b>At sea:</b> one bitter voice can change a whole mess room. Help the struggling man honestly — but never let his mood take over the ship."},
 {n:11,t:"Be Needed, Not Just Liked",b:"People keep and protect what they depend on. Being useful is stronger ground than being popular. <b>At sea:</b> be the officer whose cargo numbers are never wrong. But never hide knowledge to stay needed — train your replacement with pride."},
 {n:12,t:"One Honest Admission Buys Much Trust",b:"Admitting a small fault openly makes people trust everything else you say. <b>At sea:</b> saying 'that mistake was mine' early wins more authority than hiding it ever could. But honesty as a trick is manipulation; honesty as a habit is leadership."},
 {n:13,t:"Appeal to Interest, Never to Mercy",b:"When you ask for help, show people what THEY gain — not what they owe you. <b>At sea:</b> the terminal does not care about your rest hours. It cares about its berth window. Speak in the listener's currency."},
 {n:14,t:"The Spy Posture — Recognize It, Refuse It",b:"The original law says: act like a friend, collect information like a spy. <b>At sea, run it in reverse:</b> assume agents and inspectors are reading you this way. Learn openly by walking the deck — never use informers in your own mess room."},
 {n:15,t:"Finish What You Start — Completely",b:"A problem solved halfway comes back stronger. <b>At sea:</b> a discipline case left unclear, a conflict mediated halfway, a defect patched but not closed — all return at the worst moment. Close every loop, formally and visibly."},
 {n:16,t:"Use Absence to Raise Your Value",b:"Too much presence makes you cheap; some distance creates respect. <b>At sea:</b> the Mate who stands over every job teaches the crew to stop thinking. Step back on purpose — then your appearances start to mean something."},
 {n:17,t:"Predictable Standards, Unpredictable Checks",b:"The original law builds fear through being unpredictable — poison on a ship, where predictability is safety. <b>At sea:</b> keep your standards completely predictable. Only vary the timing of your rounds and spot checks."},
 {n:18,t:"Never Build Walls Around Yourself",b:"Isolation feels safe and makes you blind. <b>At sea:</b> the officer who eats alone, skips the deck walk, and leads by memo learns about problems only when they become incidents. Moving around the ship IS your intelligence system."},
 {n:19,t:"Know Exactly Whom You Are Dealing With",b:"The same move ruins one man and motivates another. <b>At sea:</b> some men accept correction in public; some never forgive it. Read the person before you push — that is what the Personality Analyzer in Tools is for."},
 {n:20,t:"Do Not Join Other People's Wars",b:"Taking sides in other quarrels spends your power on their goals. <b>At sea:</b> stay out of deck-versus-engine camps and office feuds. The neutral officer is welcomed by all sides — and trusted as the only fair judge."},
 {n:21,t:"Let Others Feel Cleverer",b:"People relax and work harder when they feel intelligent. <b>At sea:</b> coach juniors with questions you already know the answers to. Let the cadet find the error himself. But never pretend to be weak in your own duties."},
 {n:22,t:"Yield Tactically When Outmatched",b:"Sometimes giving up the appearance of victory saves the substance. <b>At sea:</b> when the office insists on a flawed but legal plan, comply on paper, record your concerns, and save your strength for the battles about safety."},
 {n:23,t:"Concentrate Your Forces",b:"Power spread thin is power lost. <b>At sea:</b> one priority per day, driven to the finish, beats ten jobs at thirty percent. A focused officer looks strong; a scattered one looks like he is drowning."},
 {n:24,t:"Master Professional Politeness",b:"Every fleet is a court: superintendents, pilots, surveyors, charterers. <b>At sea:</b> diplomacy without flattery. Remember names, respect small customs, deliver hard messages in soft packaging. Politeness costs nothing and pays forever."},
 {n:25,t:"Write Your Own Identity",b:"If you do not define yourself, others will do it for you. <b>At sea:</b> your rank comes with the contract; your reputation is written daily by you. Choose two or three traits — fair, calm, knows cargo — and live them until they travel ahead of you."},
 {n:26,t:"Keep Your Hands Clean — Honestly",b:"The original law uses scapegoats to stay spotless. <b>At sea, invert it for survival:</b> own your mistakes loudly and document your decisions — so that nobody can ever make YOU the scapegoat when the inquiry comes."},
 {n:27,t:"Build Belief in Standards, Not in Yourself",b:"The original law builds a personal cult. <b>At sea:</b> redirect that energy. Make the crew believe in the standard, the ship, and the professional pride. Belief in a person leaves at crew change; belief in a standard stays aboard."},
 {n:28,t:"Act with Boldness",b:"Hesitation infects everyone watching. Bold action, even imperfect, creates its own momentum. <b>At sea:</b> when the decision is yours and the moment has come, commit fully. Timid officers get tested — by crews, terminals and weather alike."},
 {n:29,t:"Plan All the Way to the End",b:"The ending decides who gets the credit and who gets the blame. <b>At sea:</b> plan decisions like passages — consequences, exits, weather, and a fallback for every leg. The officer who thought three steps ahead looks lucky to everyone else."},
 {n:30,t:"Make Your Competence Look Effortless",b:"Visible panic invites doubt; calm hides the hard work. <b>At sea:</b> never perform your stress in front of the crew — it taxes them. But never hide your real workload from the people who plan your rest hours."},
 {n:31,t:"Control the Options",b:"Let people choose — between options you can accept either way. <b>At sea:</b> give the Bosun two good sequences and let him pick. He owns the plan; you own the outcome. Choice inside boundaries gives dignity without risk."},
 {n:32,t:"Give People a Story Worth Working In",b:"The original law sells fantasies. <b>At sea, the honest version:</b> crews run on meaning — the finished hold, the clean inspection, the pride of the ship. Paint that picture often. Never sell illusions about reliefs, pay or promotion."},
 {n:33,t:"Find Each Man's Lever — and Lift, Do Not Press",b:"Every man has a motivator: family, pride, learning, recognition. <b>At sea:</b> find it and connect his work to it — that is leadership. Pressing on a man's fears with the same knowledge is bullying. Same law, opposite officer."},
 {n:34,t:"Carry Yourself Like the Rank You Want",b:"People mostly accept the price you put on yourself. <b>At sea:</b> act with the judgment and bearing of a Master now. Offices promote officers who already look like the next rank. Royal bearing, zero arrogance."},
 {n:35,t:"Master the Art of Timing",b:"The same words land differently at different moments. <b>At sea:</b> never correct a man in the middle of a crisis. Never bring requests when the Master is firefighting. Never deliver bad news cold. Hurry shows weakness; timing shows command."},
 {n:36,t:"Ignore Small Insults",b:"Attention makes problems grow; what you ignore becomes small. <b>At sea:</b> not every mess-room grumble deserves an answer. Reacting to a petty provocation makes it an event. Calm indifference starves it."},
 {n:37,t:"Create Strong Images",b:"Pictures hit deeper than memos. <b>At sea:</b> the bent shackle on the toolbox-talk table, the before-and-after photos, one chart of near-misses. A single strong image does what ten circulars cannot."},
 {n:38,t:"Think Freely, Conform in Form",b:"Open rebellion against the system wins nothing but isolation. <b>At sea:</b> disagree with the SMS through channels — proposals, the DPA — while complying meanwhile. Ships need reformers, not visible rebels."},
 {n:39,t:"Refuse the Bait — Stay Unmoved",b:"The original law stirs the water to catch fish. <b>At sea, play defense:</b> people who provoke you — a needling foreman, a baiting inspector — want your temper. The angler loses when the fish will not bite."},
 {n:40,t:"Respect the Cost of Free",b:"What comes free carries a hidden bill. <b>At sea:</b> port gifts, foreman favors, agent hospitality — all create debts someone plans to collect. Refuse politely, declare per company policy, and pay full price for your independence."},
 {n:41,t:"Step Out of the Predecessor's Shadow",b:"Copying a famous predecessor guarantees comparison and defeat. <b>At sea:</b> when you relieve a respected Mate, be visibly your own man — different strengths, same standards. Honor him; never imitate him."},
 {n:42,t:"Deal with the Ringleader, the Group Settles",b:"Trouble usually flows from one source. <b>At sea:</b> handle the instigator individually and early — fair, private, firm. Correct the one man before his mood becomes a faction."},
 {n:43,t:"Win Hearts and Minds — Force Ends at the Watch Change",b:"Force works only while it is watching. <b>At sea:</b> a crew that complies willingly at 0300 in your absence is the only kind that keeps a ship safe. Fairness outlasts every threat you could make."},
 {n:44,t:"Mirror Calm to Disarm Heat",b:"Repeating a man's words back, slowly and calmly, cools what arguing would inflame. <b>At sea:</b> the quiet late-night-radio voice plus the mirrored phrase — 'the glasses fog up?' — pulls an angry man into explaining instead of exploding."},
 {n:45,t:"Preach Improvement, Move in Small Tides",b:"People defend their routines more than they admit. Sudden revolutions frighten crews. <b>At sea:</b> change one routine at a time, connected to something familiar, with the reason attached. Steady tides reshape coastlines; tsunamis only destroy."},
 {n:46,t:"Show a Human Flaw Now and Then",b:"Perfect people attract envy and distance. <b>At sea:</b> admit the small imperfections freely — the seasickness in cadet days, the chart you once misread. Never the safety-critical ones waiting for correction; those go through the system."},
 {n:47,t:"Stop at the Victory",b:"Pushing past the win creates the next war. <b>At sea:</b> when the foreman gives in, when the argument is won, when the warning has landed — stop. Generosity in victory is what lets the loser work with you tomorrow."},
 {n:48,t:"Be Flexible in Style, Granite in Standards",b:"Rigid shapes are easy targets; flexible ones are hard to attack. <b>At sea:</b> change your approach with each person, port and crisis — direct here, questioning there. But never be flexible about standards. Soft methods, immovable lines."}
];

/* ---------- 30-DAY COURSE ---------- */
function taskDone(d, ti){
  const t = COURSE[d].tasks[ti];
  if (t.m) return !!S.courseChecks[d+':'+ti];
  if (t.k==='module') return S.doneModules.includes(t.id);
  if (t.k==='scen') return S.doneScenarios.includes(t.i);
  if (t.k==='sim') return (S.simRuns[t.key]||[]).includes(t.i);
  if (t.k==='tool') return t.id==='assess' ? !!S.assessDone : S.simsDone.includes(t.id);
  if (t.k==='review') return reviewDue().length===0 && S.doneModules.length>0;
  return false;
}
function dayDone(d){ return COURSE[d].tasks.every((_,ti)=>taskDone(d,ti)); }
function currentDay(){ for (let d=0; d<COURSE.length; d++){ if (!S.courseDays.includes(d)) return d; } return COURSE.length; }
window.taskGo = (d, ti) => {
  const t = COURSE[d].tasks[ti];
  if (t.m) { S.courseChecks[d+':'+ti] = !S.courseChecks[d+':'+ti]; save(); show('course'); return; }
  if (t.k==='module') show('module', t.id);
  else if (t.k==='scen') show('scenario', t.i);
  else if (t.k==='sim') runSim(t.key, t.i);
  else if (t.k==='tool') show(t.id);
  else if (t.k==='review') show('review');
};
window.completeDay = d => {

  checkBadges();
  show('course');
};

    const locked = d > cd;
    const open = d === cd;
    if (!open) return `<div class="row" style="${locked?'opacity:.45':''}" ${done?`onclick="show('courseday',${d})"`:''}>
      <div class="ic mono">${String(d+1).padStart(2,'0')}</div>
      <div class="tx"><b>${day.t}</b><span>${day.tasks.length} task${day.tasks.length>1?'s':''}</span></div>
      ${done?'<span class="done">✓</span>':(locked?'<span class="muted small mono">locked</span>':'')}
      ${done?'<span class="chev">›</span>':''}
    </div>`;
    return `<div class="card gold" style="margin:6px 0 10px">
      <div class="eyebrow">Day ${d+1} · current</div>
      <h3 style="font-family:'Marcellus',serif;color:var(--brass-hi);font-size:1.15rem;margin:4px 0 10px">${day.t}</h3>
      ${day.tasks.map((t,ti)=>{
        const td = taskDone(d,ti);
        return `<div class="opt ${td?'good':''}" style="display:flex;align-items:center;gap:10px" onclick="taskGo(${d},${ti})">
          <span class="mono" style="flex:none">${td?'✓':(t.m?'☐':'›')}</span><span style="flex:1">${t.l}${t.m?' <span class=\"muted small\">(tap to tick)</span>':''}</span>
        </div>`;
      }).join('')}
      <div style="margin-top:12px"><button class="btn ${dayDone(d)?'primary':'ghost'}" ${dayDone(d)?'':'disabled'} onclick="completeDay(${d})">${dayDone(d)?'Complete Day '+(d+1)+'  +20 XP':'Finish the tasks above to complete the day'}</button></div>
    </div>`;
  }).join('')}`;
};
VIEWS.courseday = d => `${back('course','Course')}
  <div class="section-head"><h2>Day ${d+1} — ${COURSE[d].t}</h2><span class="laurel">✓ Complete</span></div>
  <div class="grid">${COURSE[d].tasks.map((t,ti)=>`<div class="row" onclick="taskGo(${d},${ti})"><div class="ic mono">${ti+1}</div><div class="tx"><b>${t.l}</b></div><span class="done">✓</span><span class="chev">›</span></div>`).join('')}</div>`;

/* ---------- CASE FILES ---------- */
VIEWS.cases = () => `${back('scen','Scenarios')}
  <div class="section-head"><h2>Case Files</h2><span class="muted small">${S.doneCases.length}/${CASES.length} studied</span></div>
  <p class="muted" style="margin-bottom:14px">Real ships, real inquiries, real lessons — each casualty read through the command lens. These are the voyages every leadership rule in this app was written in.</p>
  <div class="grid">
    ${CASES.map(c=>`<div class="row" onclick="show('casefile','${c.id}')">
      <div class="ic mono">${String(c.year).slice(2)}</div>
      <div class="tx"><b>${c.ship} (${c.year})</b><span>${c.t}</span></div>
      ${S.doneCases.includes(c.id)?'<span class="done">✓</span>':''}
      <span class="chev">›</span></div>`).join('')}
  </div>`;
VIEWS.casefile = id => {
  const c = CASES.find(x=>x.id===id), done = S.doneCases.includes(id);
  return `${back('cases','Case Files')}
  <div class="card gold">
    <div class="medalrow"><div class="medal mono" style="font-size:.85rem">${c.year}</div><div><div class="eyebrow">${c.ship}</div><h2 style="font-size:1.3rem;margin-top:2px">${c.t}</h2></div></div>
    <div class="goldrule"></div>
  </div>
  <div class="callout"><div class="ctitle">What happened</div>${c.what}</div>
  <div class="callout psy"><div class="ctitle">Where command failed</div>${c.command}</div>
  <div class="callout gold"><div class="ctitle">Lessons for your bridge</div><ul class="clean">${c.lessons.map(l=>`<li>${l}</li>`).join('')}</ul></div>
  <div style="margin-top:16px"><button class="btn ${done?'ghost':'primary'}" id="caseBtn" ${done?'disabled':''}>${done?'Studied ✓':'Mark as studied  +15 XP'}</button></div>`;
};
BIND.casefile = id => {
  const b = document.getElementById('caseBtn');
  if (b) b.onclick = () => {
    if (!S.doneCases.includes(id)) { S.doneCases.push(id); save(); addXP(15,'Case file studied'); checkBadges(); show('casefile', id); }
  };
};

/* ---------- DRILL MODE ---------- */
let drill = null;
VIEWS.drill = () => {
  const pool = [];
  Object.keys(QUIZZES).forEach(mid => QUIZZES[mid].forEach(q => pool.push({...q, src: MODULES.find(m=>m.id===mid).title})));
  drill = { qs: pool.sort(()=>Math.random()-.5).slice(0,10), i:0, right:0 };
  return `${back('tools','Tools')}
  <div class="section-head"><h2>Quick-Fire Drill</h2><span class="muted small mono" id="drillPos">1/10</span></div>
  <p class="muted" style="margin-bottom:14px">Ten random questions from across all twenty modules. Score 7 or more for bonus XP (once per day).</p>
  <div id="drillArea"></div>`;
};
BIND.drill = () => {
  const area = document.getElementById('drillArea');
  const draw = () => {
    if (drill.i >= drill.qs.length) {
      const passed = drill.right >= 7;
      const fresh = passed && S.drillDay !== TODAY;
      if (fresh) { S.drillDay = TODAY; save(); addXP(15,'Drill passed'); }
      area.innerHTML = `<div class="card gold fadein" style="text-align:center;padding:28px 18px">
        <div style="font-size:1.8rem;margin-bottom:6px">${passed?'🎯':'📚'}</div>
        <h3 style="font-family:'Marcellus',serif;color:var(--brass-hi)">${drill.right}/10 ${passed?'— sharp':'— keep training'}</h3>
        <p class="muted small" style="margin-top:6px">${passed?(fresh?'Bonus XP earned.':'Already earned today — drill again for practice.'):'Seven or more earns the daily bonus. The wrong ones showed you exactly which modules to revisit.'}</p>
        <div style="margin-top:14px;display:flex;gap:10px;justify-content:center"><button class="btn primary" onclick="show('drill')">Drill again</button><button class="btn ghost" onclick="show('tools')">Done</button></div></div>`;
      return;
    }
    const q = drill.qs[drill.i];
    document.getElementById('drillPos').textContent = (drill.i+1)+'/10';
    area.innerHTML = `<div class="card fadein">
      <div class="eyebrow">${q.src}</div>
      <p style="margin:10px 0;font-size:.94rem;color:var(--text-bright)">${q.q}</p>
      ${q.o.map((op,oi)=>`<div class="opt" data-o="${oi}">${op}</div>`).join('')}
    </div>`;
    area.querySelectorAll('.opt').forEach(el => el.onclick = () => {
      if (area.dataset.locked) return;
      area.dataset.locked='1';
      const pick = +el.dataset.o;
      if (pick===q.a) drill.right++;
      area.querySelectorAll('.opt').forEach(x=>{
        const oi=+x.dataset.o;
        if (oi===q.a) x.classList.add('good'); else if (oi===pick) x.classList.add('bad');
        x.style.cursor='default';
      });
      drill.i++;
      setTimeout(()=>{ delete area.dataset.locked; draw(); }, pick===q.a?550:1300);
    });
  };
  draw();
};

/* ---------- SETTINGS ---------- */
VIEWS.settings = () => `${back('tools','Tools')}
  <div class="section-head"><h2>Settings</h2></div>
  <div class="card" style="margin-bottom:12px">
    <div class="eyebrow">Theme</div>
    <div class="chiprow" style="margin-top:10px">
      <button class="chip ${S.theme!=='day'?'on':''}" onclick="S.theme='night';save();applyTheme();show('settings')">Night watch</button>
      <button class="chip ${S.theme==='day'?'on':''}" onclick="S.theme='day';save();applyTheme();show('settings')">Day watch</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:12px">

    <div class="chiprow" style="margin-top:10px">
      <button class="chip ${S.fontSize==='std'?'on':''}" onclick="S.fontSize='std';save();applyTheme();show('settings')">Standard</button>
      <button class="chip ${S.fontSize==='lg'?'on':''}" onclick="S.fontSize='lg';save();applyTheme();show('settings')">Large</button>
      <button class="chip ${S.fontSize==='xl'?'on':''}" onclick="S.fontSize='xl';save();applyTheme();show('settings')">Extra large</button>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" id="expBtn">Export progress (JSON)</button>
      <button class="btn ghost" id="impBtn">Import backup</button>
      <input type="file" id="impFile" accept="application/json" style="display:none">
    </div>
  </div>`;

/* ---------- WELCOME ---------- */
VIEWS.welcome = () => `
  <section class="hero card gold" style="text-align:center;padding:36px 22px">
    <svg class="compass" width="170" height="170" viewBox="0 0 40 40" fill="none" aria-hidden="true" style="left:50%;margin-left:-85px">
      <circle cx="20" cy="20" r="18.5" stroke="#C8A24E" stroke-width="1"/>
      <path d="M20 4 L22.4 17.6 L36 20 L22.4 22.4 L20 36 L17.6 22.4 L4 20 L17.6 17.6 Z" fill="#C8A24E"/>
    </svg>
    <div class="eyebrow">Welcome aboard</div>
    <h1 style="font-size:1.7rem;margin:8px 0">Master of Command</h1>
    <p class="muted" style="max-width:420px;margin:0 auto">The leadership academy for ship officers — built for the deck, not the classroom.</p>
  </section>
  <div class="grid" style="margin-bottom:16px">
    <div class="card" style="text-align:center"><div class="welcome-ic">📖</div><b style="font-size:.95rem">Learn</b><p class="muted small" style="margin-top:6px">20 modules, 48 laws, real case files — all in clear, simple English with deck examples.</p></div>
    <div class="card" style="text-align:center"><div class="welcome-ic">🎯</div><b style="font-size:.95rem">Train</b><p class="muted small" style="margin-top:6px">36 scenarios, 9 branching simulators, quizzes, and drills — decide first, then learn why.</p></div>
    <div class="card" style="text-align:center"><div class="welcome-ic">⚓</div><b style="font-size:.95rem">Track</b><p class="muted small" style="margin-top:6px">XP, ranks from Cadet to Master Mariner, a 30-day guided course, and spaced-repetition review.</p></div>
  </div>
  <div style="text-align:center"><button class="btn primary" style="padding:13px 30px" onclick="S.seen=true;save();show('dash')">Take command</button>
  <p class="muted small" style="margin-top:12px">Everything stays on this device. No account, no tracking.</p></div>`;

/* ---------- STATS ---------- */
function statBar(label, val, max, color){
  const pct = max ? Math.round(100*val/max) : 0;
  return `<div style="margin-bottom:11px">
    <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:5px"><span style="color:var(--text-soft)">${label}</span><span class="mono" style="color:${color||'var(--brass)'}">${val}/${max}</span></div>
    <div class="bar"><i style="width:${pct}%;${color?'background:'+color:''}"></i></div>
  </div>`;
}
VIEWS.stats = () => {
  const rank = rankFor(S.xp);
  // last 14 days xp
  const days = []; let maxXp = 1;
  for (let d = TODAY-13; d <= TODAY; d++){ const v = S.xpLog[d]||0; days.push(v); if (v>maxXp) maxXp=v; }
  const W=336, bw=18, gap=6;
  const bars = days.map((v,i)=>{
    const h = Math.max(2, Math.round(58*v/maxXp));
    return `<rect x="${i*(bw+gap)}" y="${62-h}" width="${bw}" height="${h}" rx="3" fill="${v?'var(--brass)':'var(--line-soft)'}" opacity="${v?'.9':'1'}"/>${v?`<text x="${i*(bw+gap)+bw/2}" y="${56-h}" text-anchor="middle" font-size="7" fill="var(--slate)" font-family="IBM Plex Mono">${v}</text>`:''}`;
  }).join('');
  const catDone = SCEN_CATS.map((c,ci)=>SCENARIOS.filter((s,i)=>s.cat===ci && S.doneScenarios.includes(i)).length);
  const toolsDone = (S.assessDone?1:0) + ['pers','convo','nego','psc','crisis','team'].filter(k=>S.simsDone.includes(k)).length;
  const simScen = Object.keys(SIM_SETS).reduce((a,k)=>a+(S.simRuns[k]||[]).length,0);
  const simTotal = Object.keys(SIM_SETS).reduce((a,k)=>a+SIM_SETS[k].scenarios.length,0);
  return `${back('tools','Tools')}
  <div class="section-head"><h2>My Statistics</h2></div>
  <div class="statline" style="margin-bottom:14px">
    <div class="stat"><b>${S.xp}</b><span>Total XP</span></div>
    <div class="stat"><b>${rank.name.split(' ')[0]}</b><span>Rank</span></div>
    <div class="stat"><b>${S.streak}</b><span>Day streak</span></div>
    <div class="stat"><b>${S.badges.length}/${BADGES.length}</b><span>Badges</span></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="eyebrow">XP — last 14 days</div>
    <svg viewBox="0 0 ${W} 64" style="width:100%;height:auto;margin-top:12px" aria-label="XP per day">${bars}</svg>
    <p class="muted small" style="margin-top:6px;text-align:right">today →</p>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="eyebrow" style="margin-bottom:12px">Academy progress</div>
    ${statBar('Modules', S.doneModules.length, MODULES.length)}
    ${statBar('Scenarios', S.doneScenarios.length, SCENARIOS.length)}
    ${statBar('Simulator scenarios', simScen, simTotal)}
    ${statBar('Case files', S.doneCases.length, CASES.length)}
    ${statBar('Tools completed', toolsDone, 7)}
    ${statBar('30-Day Course', S.courseDays.length, COURSE.length)}
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="eyebrow" style="margin-bottom:12px">Scenario mastery by category</div>
    ${SCEN_CATS.map((c,ci)=>statBar(c, catDone[ci], 3, catDone[ci]===3?'var(--good)':null)).join('')}
  </div>
  <div class="card">
    <div class="eyebrow" style="margin-bottom:10px">Collection</div>
    <p class="muted small">📝 ${Object.keys(S.notes).length} personal notes · ★ ${S.favQuotes.length} saved quotes · 🗣️ ${S.favPhrases.length} saved lines · ✒️ ${Math.min(S.quotesSeen,QUOTES.length)} quotes browsed</p>
  </div>`;
};

/* =====================================================
   SEARCH
   ===================================================== */
const overlay = document.getElementById('overlay');
const sInput = document.getElementById('searchInput');
const sRes = document.getElementById('sresults');
document.getElementById('searchBtn').onclick = () => {
  overlay.classList.add('open'); sInput.value=''; sRes.innerHTML =
    `<p class="muted small" style="text-align:center">Search 20 modules, ${SCENARIOS.length} scenarios and ${QUOTES.length} quotes</p>`;
  setTimeout(()=>sInput.focus(),50);
};
overlay.addEventListener('click', e => { if (e.target===overlay) overlay.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key==='Escape') overlay.classList.remove('open'); });
sInput.addEventListener('input', () => {
  const q = sInput.value.trim().toLowerCase();
  if (q.length < 2) { sRes.innerHTML=''; return; }
  const hits = [];
  MODULES.forEach(m => { if ((m.title+' '+m.summary+' '+m.intro).toLowerCase().includes(q))
    hits.push({t:m.title, s:'Module · Library', go:`show('module','${m.id}')`}); });
  SCENARIOS.forEach((s,i) => { if ((s.title+' '+s.situation).toLowerCase().includes(q))
    hits.push({t:s.title, s:'Scenario · '+SCEN_CATS[s.cat], go:`show('scenario',${i})`}); });
  QUOTES.forEach(qt => { if ((qt.q+' '+qt.a).toLowerCase().includes(q))
    hits.push({t:qt.q.length>70?qt.q.slice(0,70)+'…':qt.q, s:'Quote · '+qt.a, go:`show('quotes')`}); });
  POWER.forEach(p => { if ((p.t+' '+p.d).toLowerCase().includes(q))
    hits.push({t:p.t, s:'Power & Influence', go:`show('power')`}); });
  LAWS.forEach(l => { if ((l.t+' '+l.b).toLowerCase().includes(q))
    hits.push({t:'Law '+l.n+' — '+l.t, s:'48 Laws of Power', go:`show('laws')`}); });
  PHRASES.forEach(c => c.items.forEach(it => { if ((it.s+' '+it.w).toLowerCase().includes(q))
    hits.push({t:it.s.length>70?it.s.slice(0,70)+'…':it.s, s:'Phrasebook · '+c.c, go:`show('phrases')`}); }));
  CASES.forEach(c => { if ((c.ship+' '+c.t+' '+c.what+' '+c.command).toLowerCase().includes(q))
    hits.push({t:c.ship+' ('+c.year+') — '+c.t, s:'Case Files', go:`show('casefile','${c.id}')`}); });
  sRes.innerHTML = hits.length ? hits.slice(0,25).map(h =>
    `<div class="row" onclick="overlay.classList.remove('open');${h.go}">
      <div class="tx"><b>${esc(h.t)}</b><span>${h.s}</span></div><span class="chev">›</span></div>`).join('')
    : `<p class="muted small" style="text-align:center">No results for “${esc(q)}”</p>`;
});

/* =====================================================
   INIT
   ===================================================== */
['convo','nego','psc','crisis'].forEach(k=>{ if(S.simsDone.includes(k) && !(S.simRuns[k]||[]).length){ S.simRuns[k]=[0]; } });
applyTheme();
checkBadges();
show(S.seen ? 'dash' : 'welcome');
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
