<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B1322">
<link rel="manifest" href="./manifest.json">
<meta name="description" content="Master of Command — Maritime Leadership & Human Management Academy for Chief Officers and Masters.">
<title>Master of Command — Maritime Leadership Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1322;
  --deep:#101C30;
  --panel:#13213A;
  --glass:rgba(22,38,62,.55);
  --glass-2:rgba(28,46,74,.45);
  --line:rgba(200,162,78,.16);
  --line-soft:rgba(141,161,188,.14);
  --brass:#C8A24E;
  --brass-hi:#E8C97D;
  --foam:#EAF0F7;
  --slate:#8DA1BC;
  --slate-dim:#5F7390;
  --good:#46B08C;
  --good-bg:rgba(70,176,140,.1);
  --bad:#E25A4E;
  --bad-bg:rgba(226,90,78,.1);
  --info:#5B9BD5;
  --r:16px;
  --r-sm:10px;
  --nav-h:64px;
  --shadow:0 10px 34px rgba(2,8,20,.5);
  --text-soft:#CBD6E4;
  --text-mid:#C5D1E0;
  --text-bright:#E3EAF3;
  --bar-bg:rgba(11,19,34,.82);
  --bar-bg-2:rgba(11,19,34,.92);
  --well:rgba(11,19,34,.4);
  --well-2:rgba(11,19,34,.5);
  --well-3:rgba(11,19,34,.6);
  --overlay-bg:rgba(7,12,22,.86);
  --hero-grad:linear-gradient(120deg,#F4EBD6,#E8C97D 55%,#C8A24E);
  --wm-grad:linear-gradient(110deg,#EAF0F7,#E8C97D);
  --body-img:radial-gradient(1100px 500px at 85% -10%, rgba(200,162,78,.07), transparent 60%),radial-gradient(900px 600px at -10% 110%, rgba(91,155,213,.06), transparent 60%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  background:var(--ink);
  color:var(--foam);
  line-height:1.6;
  min-height:100vh;
  background-image:var(--body-img);
  background-attachment:fixed;
}
::selection{background:rgba(200,162,78,.3)}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:1rem}
h1,h2,h3,.display{font-family:'Marcellus',serif;font-weight:400;letter-spacing:.01em}
.mono{font-family:'IBM Plex Mono',monospace}

/* ---------- shell ---------- */
.topbar{
  position:sticky;top:0;z-index:60;
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--bar-bg);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.wordmark{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.wordmark svg{flex:none}
.wordmark .wm-title{font-family:'Marcellus',serif;font-size:1.02rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wordmark .wm-sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.22em;color:var(--brass);text-transform:uppercase}
.topbar{gap:8px}
.iconbtn{
  width:40px;height:40px;border-radius:12px;flex:none;
  display:grid;place-items:center;
  border:1px solid var(--line-soft);
  background:var(--glass-2);
  color:var(--slate);
  transition:color .2s,border-color .2s;
}
.iconbtn:hover{color:var(--brass-hi);border-color:var(--line)}

.layout{display:flex;min-height:calc(100vh - 65px)}
.rail{display:none}
main{flex:1;min-width:0;padding:18px 16px calc(var(--nav-h) + 28px);max-width:980px;margin:0 auto;width:100%}

/* bottom nav (mobile) */
.bnav{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  display:flex;justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  background:var(--bar-bg-2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
}
.bnav button{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--slate-dim);padding:4px 4px;border-radius:10px;min-width:38px;
  transition:color .2s;
}
.bnav button svg{width:21px;height:21px}
.bnav button.active{color:var(--brass-hi)}
.bnav button:focus-visible{outline:2px solid var(--brass);outline-offset:2px}

@media(min-width:960px){
  .bnav{display:none}
  .rail{
    display:flex;flex-direction:column;gap:4px;
    width:218px;flex:none;padding:22px 14px;
    border-right:1px solid var(--line);
    position:sticky;top:65px;height:calc(100vh - 65px);
  }
  .rail button{
    display:flex;align-items:center;gap:12px;text-align:left;
    padding:10px 14px;border-radius:12px;
    color:var(--slate);font-size:.92rem;
    border:1px solid transparent;
    transition:all .2s;
  }
  .rail button svg{width:19px;height:19px;flex:none}
  .rail button:hover{color:var(--foam);background:var(--glass-2)}
  .rail button.active{color:var(--brass-hi);background:var(--glass);border-color:var(--line)}
  main{padding:28px 36px 60px}
}

/* ---------- glass primitives ---------- */
.card{
  background:var(--glass);
  border:1px solid var(--line-soft);
  border-radius:var(--r);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:18px;
  box-shadow:var(--shadow);
}
.card.gold{border-color:var(--line)}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.26em;
  text-transform:uppercase;color:var(--brass);margin-bottom:8px;
}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:26px 0 14px}
.section-head h2{font-size:1.32rem}
.muted{color:var(--slate);font-size:.92rem}
.small{font-size:.82rem}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:18px 0;border:none}
.grid{display:grid;gap:12px;grid-template-columns:minmax(0,1fr)}
.grid>*{min-width:0}
@media(min-width:680px){.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}}

.chip{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'IBM Plex Mono',monospace;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;
  border:1px solid var(--line-soft);color:var(--slate);
  background:var(--well);
}
.chip.gold{color:var(--brass-hi);border-color:var(--line)}
.chip.green{color:var(--good);border-color:rgba(70,176,140,.3)}
.chiprow{display:flex;flex-wrap:wrap;gap:8px}
.chiprow button.chip{cursor:pointer;transition:all .2s}
.chiprow button.chip:hover{color:var(--foam)}
.chiprow button.chip.on{color:var(--ink);background:var(--brass);border-color:var(--brass);font-weight:500}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:12px;font-size:.92rem;font-weight:500;
  border:1px solid var(--line);color:var(--brass-hi);background:rgba(200,162,78,.08);
  transition:all .2s;
}
.btn:hover{background:rgba(200,162,78,.16)}
.btn.primary{background:linear-gradient(135deg,#D4AC5A,#B08838);color:#15110a;border-color:transparent}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{border-color:var(--line-soft);color:var(--slate);background:transparent}
.btn.ghost:hover{color:var(--foam)}
.btn:focus-visible,.iconbtn:focus-visible,.chiprow button:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
.btn[disabled]{opacity:.45;cursor:default}

/* ---------- signature: rank stripes ---------- */
.stripes{display:flex;gap:5px;align-items:flex-end}
.stripe{
  width:34px;height:7px;border-radius:2px;
  background:rgba(141,161,188,.18);
  position:relative;overflow:hidden;
}
.stripe.lit{background:linear-gradient(180deg,#EFD894,#C8A24E 55%,#9C7A2E)}
.stripe.lit::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.4) 50%,transparent 70%);
  transform:translateX(-120%);
  animation:glint 5s ease-in-out infinite;
}
.stripe.half{background:linear-gradient(90deg,#C8A24E 50%,rgba(141,161,188,.18) 50%)}
@keyframes glint{0%,70%{transform:translateX(-120%)}85%,100%{transform:translateX(120%)}}
.stripes.sm .stripe{width:20px;height:4px}

/* ---------- hero ---------- */
.hero{
  position:relative;overflow:hidden;
  border:1px solid var(--line);border-radius:20px;
  background:linear-gradient(160deg,rgba(28,46,74,.7),rgba(13,22,40,.85));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:24px 20px;
  box-shadow:var(--shadow);
}
.hero .compass{
  position:absolute;right:-70px;top:-70px;width:280px;height:280px;
  opacity:.1;pointer-events:none;
  animation:slowspin 120s linear infinite;
}
@media(prefers-reduced-motion:reduce){
  .hero .compass,.stripe.lit::after,body::before,body::after,.card.gold::before,.scorering::before,.badge.won .bicon{animation:none}
  .riseIn{opacity:1;animation:none}
  .voyage .ship,.voyage .route-done{animation:none}
  #ringArc{transition:none}
  *{transition:none!important;scroll-behavior:auto!important}
}
@keyframes slowspin{to{transform:rotate(360deg)}}
.hero h1{font-size:1.5rem;line-height:1.25;margin:4px 0 2px}
.rankline{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap}
.rankname{font-family:'Marcellus',serif;color:var(--brass-hi);font-size:1.05rem}
.scorering{position:relative;width:118px;height:118px;flex:none}
.scorering svg{transform:rotate(-90deg)}
.scorering .num{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.scorering .num b{font-family:'Marcellus',serif;font-size:1.9rem;font-weight:400;color:var(--brass-hi)}
.scorering .num span{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:var(--slate)}
.herorow{display:flex;gap:18px;align-items:center;margin-top:6px}
.statline{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.stat{
  flex:1;min-width:88px;
  background:var(--well-2);border:1px solid var(--line-soft);border-radius:12px;
  padding:10px 12px;
}
.stat b{font-family:'Marcellus',serif;font-size:1.2rem;font-weight:400;display:block;color:var(--foam)}
.stat span{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--slate)}

/* ---------- list rows ---------- */
.row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:14px;
  background:var(--glass-2);border:1px solid var(--line-soft);
  cursor:pointer;transition:border-color .2s,transform .15s;
  width:100%;text-align:left;
}
.row:hover{border-color:var(--line);transform:translateY(-1px)}
.row .ic svg{width:20px;height:20px}
.row .ic{
  width:42px;height:42px;border-radius:12px;flex:none;
  display:grid;place-items:center;
  background:rgba(200,162,78,.1);color:var(--brass-hi);
  border:1px solid var(--line);font-family:'Marcellus',serif;
}
.row .tx{flex:1;min-width:0}
.row .tx b{display:block;font-weight:500;font-size:.95rem}
.row .tx span{color:var(--slate);font-size:.8rem;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .done{color:var(--good);flex:none}
.row .chev{color:var(--slate-dim);flex:none}

/* ---------- detail views ---------- */
.backbtn{display:inline-flex;align-items:center;gap:8px;color:var(--slate);font-size:.86rem;margin-bottom:14px;padding:6px 4px;border-radius:8px}
.backbtn:hover{color:var(--brass-hi)}
.prose h3{color:var(--brass-hi);font-size:1.05rem;margin:20px 0 6px}
.prose p{color:var(--text-soft);font-size:.94rem;margin-bottom:10px}
.principle{
  border-left:2px solid var(--brass);
  background:var(--glass-2);
  border-radius:0 12px 12px 0;
  padding:13px 15px;margin:12px 0;
}
.principle b{display:block;font-family:'Marcellus',serif;font-weight:400;color:var(--brass-hi);margin-bottom:4px;font-size:1rem}
.principle p{color:var(--text-mid);font-size:.9rem;margin:0}
.callout{
  border-radius:12px;padding:13px 15px;margin:12px 0;font-size:.9rem;
  border:1px solid var(--line-soft);background:rgba(91,155,213,.08);color:var(--text-soft);
}
.callout.best{background:var(--good-bg);border-color:rgba(70,176,140,.35)}
.callout.worst{background:var(--bad-bg);border-color:rgba(226,90,78,.35)}
.callout .ctitle{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;
  display:block;margin-bottom:5px;
}
.callout.best .ctitle{color:var(--good)}
.callout.worst .ctitle{color:var(--bad)}
.callout.psy .ctitle{color:var(--info)}
.callout.gold{background:rgba(200,162,78,.08);border-color:var(--line)}
.callout.gold .ctitle{color:var(--brass)}

/* ---------- quotes ---------- */
.quote{
  position:relative;padding:18px 18px 14px 22px;margin-bottom:12px;
  background:var(--glass-2);border:1px solid var(--line-soft);border-radius:14px;
}
.quote::before{
  content:"";position:absolute;left:0;top:14px;bottom:14px;width:2px;
  background:linear-gradient(180deg,var(--brass-hi),transparent);
}
.quote p{font-family:'Marcellus',serif;font-size:1.02rem;line-height:1.5;color:var(--text-bright)}
.quote footer{margin-top:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.quote cite{font-style:normal;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.12em;color:var(--brass);text-transform:uppercase}

/* ---------- tools / quiz ---------- */
.opt{
  display:block;width:100%;text-align:left;
  padding:13px 15px;margin:8px 0;border-radius:12px;font-size:.9rem;
  background:var(--glass-2);border:1px solid var(--line-soft);color:#CFDAE8;
  transition:all .2s;
}
.opt{cursor:pointer}
.opt:hover{border-color:var(--line);color:var(--foam)}
.opt.sel{border-color:var(--brass);background:rgba(200,162,78,.1);color:var(--brass-hi)}
.opt.good{border-color:rgba(70,176,140,.5);background:var(--good-bg)}
.opt.bad{border-color:rgba(226,90,78,.5);background:var(--bad-bg)}
.bar{height:7px;border-radius:99px;background:rgba(141,161,188,.15);overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#9C7A2E,#E8C97D);transition:width .5s ease}
.fieldrow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
input[type=text],select{
  flex:1;min-width:140px;
  background:var(--well-3);border:1px solid var(--line-soft);border-radius:10px;
  color:var(--foam);padding:10px 12px;outline:none;
}
input[type=text]:focus,select:focus{border-color:var(--brass)}
select option{background:var(--deep)}
.checkline{display:flex;gap:10px;align-items:flex-start;padding:8px 4px;font-size:.88rem;color:var(--text-mid);cursor:pointer}
.checkline input{accent-color:var(--brass);margin-top:4px}

/* ---------- badges ---------- */
.badgegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.badge{
  text-align:center;padding:14px 8px;border-radius:14px;
  background:var(--glass-2);border:1px solid var(--line-soft);
  opacity:.35;filter:grayscale(1);transition:all .4s;
}
.badge.won{opacity:1;filter:none;border-color:var(--line)}
.badge .bicon{font-size:1.5rem;line-height:1;margin-bottom:6px}
.badge b{display:block;font-size:.68rem;font-weight:500;color:var(--foam)}
.badge span{font-size:.58rem;color:var(--slate-dim);font-family:'IBM Plex Mono',monospace}

/* ---------- search overlay ---------- */
.overlay{
  position:fixed;inset:0;z-index:90;display:none;
  background:var(--overlay-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:14vh 16px 20px;overflow-y:auto;
}
.overlay.open{display:block}
.searchbox{max-width:620px;margin:0 auto}
.searchbox input{width:100%;font-size:1.05rem;padding:14px 16px;border-radius:14px}
.sresults{max-width:620px;margin:14px auto;display:flex;flex-direction:column;gap:8px}

/* toast */
.toast{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px);transform:translate(-50%,20px);
  z-index:99;opacity:0;pointer-events:none;
  background:linear-gradient(135deg,#D4AC5A,#B08838);color:#15110a;font-weight:500;font-size:.86rem;
  padding:11px 20px;border-radius:99px;box-shadow:0 8px 28px rgba(0,0,0,.5);
  transition:all .35s ease;white-space:nowrap;
}
.toast.show{opacity:1;transform:translate(-50%,0)}

.fadein{animation:fadein .4s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
ul.clean{list-style:none}
ul.clean li{padding:6px 0 6px 22px;position:relative;color:var(--text-mid);font-size:.9rem}
ul.clean li::before{content:"◆";position:absolute;left:2px;color:var(--brass);font-size:.6rem;top:11px}
.scriptbox{
  font-size:.9rem;color:#D8E2EE;font-style:italic;
  background:var(--well-2);border:1px solid var(--line-soft);border-radius:12px;
  padding:13px 15px;margin:8px 0;
}
.scriptbox::before{content:"“";color:var(--brass);font-family:'Marcellus',serif;font-size:1.3rem;margin-right:2px}
.scriptbox::after{content:"”";color:var(--brass);font-family:'Marcellus',serif;font-size:1.3rem;margin-left:2px}

/* ---------- v2 visual upgrades ---------- */
body::before,body::after{content:"";position:fixed;z-index:-1;border-radius:50%;filter:blur(90px);pointer-events:none}
body::before{width:62vmax;height:62vmax;left:-22vmax;top:-26vmax;opacity:.55;background:radial-gradient(circle,rgba(38,68,118,.6),transparent 64%);animation:drift1 26s ease-in-out infinite alternate}
body::after{width:56vmax;height:56vmax;right:-24vmax;bottom:-28vmax;opacity:.5;background:radial-gradient(circle,rgba(200,162,78,.17),transparent 64%);animation:drift2 34s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(9vmax,7vmax) scale(1.14)}}
@keyframes drift2{to{transform:translate(-8vmax,-6vmax) scale(1.1)}}
.card{position:relative;overflow:hidden}
.card.gold::before{content:"";position:absolute;top:0;left:-80%;width:45%;height:100%;z-index:0;background:linear-gradient(105deg,transparent,rgba(232,201,125,.075),transparent);transform:skewX(-18deg);animation:sheen 8s ease-in-out infinite;pointer-events:none}
@keyframes sheen{0%,58%{left:-80%}88%,100%{left:135%}}
.card>*{position:relative;z-index:1}
.hero h1{background:var(--hero-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.scorering::before{content:"";position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(200,162,78,.28);animation:ping 3.4s ease-out infinite}
@keyframes ping{0%{transform:scale(.86);opacity:.8}70%,100%{transform:scale(1.22);opacity:0}}
#ringArc{transition:stroke-dashoffset 1.3s cubic-bezier(.3,.7,.25,1)}
.riseIn{opacity:0;animation:rise .55s cubic-bezier(.2,.7,.3,1) forwards}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.btn,.row,.opt,.chip{will-change:transform}
.btn:active{transform:scale(.96)}
.row:active{transform:scale(.985)}
.opt:active{transform:scale(.99)}
.row:hover .chev{transform:translateX(3px);color:var(--brass)}
.row .chev{transition:transform .2s,color .2s}
.badge.won .bicon{animation:bglow 2.6s ease-in-out infinite}
@keyframes bglow{0%,100%{filter:drop-shadow(0 0 0 rgba(232,201,125,0))}50%{filter:drop-shadow(0 0 7px rgba(232,201,125,.55))}}
.lawnum{
  flex:none;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-family:'Marcellus',serif;font-size:1rem;color:var(--brass-hi);
  background:linear-gradient(150deg,rgba(200,162,78,.18),rgba(200,162,78,.05));
  border:1px solid var(--line);
}
.law{display:flex;gap:14px;align-items:flex-start}
.law .lt{font-family:'Marcellus',serif;color:var(--brass-hi);font-size:1.02rem;margin-bottom:4px}
.law p{color:var(--text-mid);font-size:.9rem;margin:0}
.law p b{color:var(--brass);font-weight:500}
.topbar .wm-title{background:var(--wm-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

/* ---------- DAY WATCH theme ---------- */
html[data-theme="day"]{
  --ink:#EDE7D8; --deep:#F5F0E4; --panel:#FFFFFF;
  --glass:rgba(255,255,255,.78); --glass-2:rgba(255,255,255,.6);
  --line:rgba(140,106,36,.3); --line-soft:rgba(22,38,61,.13);
  --brass:#8E6E24; --brass-hi:#6E531A;
  --foam:#16263D; --slate:#48596F; --slate-dim:#76869B;
  --good:#177557; --good-bg:rgba(23,117,87,.09);
  --bad:#AE3A2F; --bad-bg:rgba(174,58,47,.08);
  --info:#27619B;
  --shadow:0 10px 30px rgba(22,38,61,.12);
  --text-soft:#33465E; --text-mid:#2E415A; --text-bright:#101D30;
  --bar-bg:rgba(245,240,228,.86); --bar-bg-2:rgba(245,240,228,.94);
  --well:rgba(22,38,61,.05); --well-2:rgba(22,38,61,.06); --well-3:rgba(255,255,255,.85);
  --overlay-bg:rgba(237,231,216,.92);
  --hero-grad:linear-gradient(120deg,#1B2B42,#6E531A 70%,#8E6E24);
  --wm-grad:linear-gradient(110deg,#16263D,#8E6E24);
  --body-img:radial-gradient(1100px 500px at 85% -10%, rgba(142,110,36,.1), transparent 60%),radial-gradient(900px 600px at -10% 110%, rgba(39,97,155,.07), transparent 60%);
}
html[data-theme="day"] body::before{opacity:.4;background:radial-gradient(circle,rgba(39,97,155,.25),transparent 64%)}
html[data-theme="day"] body::after{opacity:.45;background:radial-gradient(circle,rgba(142,110,36,.2),transparent 64%)}
html[data-theme="day"] .card{box-shadow:0 2px 16px rgba(22,38,61,.07)}
html[data-theme="day"] .card.gold::before{background:linear-gradient(105deg,transparent,rgba(142,110,36,.06),transparent)}
html[data-theme="day"] .stripe.lit{background:linear-gradient(180deg,#C8A24E,#8E6E24 55%,#6E531A)}
html[data-theme="day"] ::selection{background:rgba(142,110,36,.25)}
html[data-theme="day"] .btn.primary{color:#fff;background:linear-gradient(135deg,#8E6E24,#6E531A)}
html[data-theme="day"] .toast{color:#fff;background:linear-gradient(135deg,#8E6E24,#6E531A)}
html, body, .card, .topbar, .bnav, .row, .stat, .quote, .principle, .callout, .opt, .badge{transition:background .35s ease, color .35s ease, border-color .35s ease}

/* ---------- hero v3: chart texture ---------- */
.hero{isolation:isolate}
.hero .chartlines{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5}
.hero .compass{z-index:0}
.herorow{margin-top:16px}

/* ---------- voyage track ---------- */
.voyage{padding:22px 18px 12px;overflow:visible}
.voyage svg{width:100%;height:auto;display:block;overflow:visible}
.voyage .vport{font-family:'IBM Plex Mono',monospace;font-size:7.4px;letter-spacing:.06em;fill:var(--slate)}
.voyage .vport.lit{fill:var(--brass)}
.voyage .vxp{font-family:'IBM Plex Mono',monospace;font-size:7px;fill:var(--slate-dim)}
@keyframes shipbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.4px)}}
.voyage .ship{animation:shipbob 3.2s ease-in-out infinite;transform-box:fill-box}
@keyframes dashflow{to{stroke-dashoffset:-14px}}
.voyage .route-done{animation:dashflow 1.6s linear infinite}

/* ---------- quotes v2 ---------- */
.quote{border-left:3px solid var(--qa,var(--brass));transition:transform .25s ease,border-color .25s,box-shadow .25s}
.quote:hover{transform:translateY(-3px)}
.quote::before{font-size:2.4rem;opacity:.85}
.quote .chip{color:var(--qa,var(--brass));border-color:currentColor}

/* ---------- medallion headers ---------- */
.medal svg{width:22px;height:22px}
.medal{
  width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;
  font-family:'Marcellus',serif;font-size:1.18rem;color:var(--brass-hi);
  background:linear-gradient(150deg,rgba(200,162,78,.2),rgba(200,162,78,.05));
  border:1px solid var(--line);
}
.medalrow{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.goldrule{height:1px;flex:1;background:linear-gradient(90deg,var(--line),transparent)}

/* ---------- completion laurel ---------- */
.laurel{display:inline-flex;align-items:center;gap:6px;color:var(--brass-hi);font-family:'IBM Plex Mono',monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--line);border-radius:99px;padding:4px 12px;background:linear-gradient(150deg,rgba(200,162,78,.16),rgba(200,162,78,.04))}

/* ---------- review flashcards ---------- */
.flash{min-height:190px;display:flex;flex-direction:column;justify-content:center;text-align:center;cursor:pointer}
.flash .ftitle{font-family:'Marcellus',serif;font-size:1.18rem;color:var(--brass-hi)}
.flash .fsrc{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--slate-dim);margin-top:10px}
.flash .fbody{font-size:.92rem;color:var(--text-mid);text-align:left}

/* ---------- compact phone lists ---------- */
@media(max-width:679px){
  .row{padding:10px 12px;gap:11px;border-radius:12px}
  .row .ic{width:34px;height:34px;border-radius:10px;font-size:.82rem}
  .row .ic svg{width:17px;height:17px}
  .row .tx b{font-size:.87rem;line-height:1.35}
  .row .tx span{
    white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;font-size:.73rem;line-height:1.45;margin-top:2px;
  }
  .grid{gap:9px}
  .section-head h2{font-size:1.22rem}
  main>p.muted{font-size:.84rem}
  .medal{width:40px;height:40px;font-size:1.05rem}
  .medal svg{width:19px;height:19px}
}

/* ---------- principle example block ---------- */
.pex{
  margin-top:10px;padding:10px 12px;border-radius:10px;
  background:var(--well);border-left:2px solid var(--good);
  font-size:.86rem;color:var(--text-soft);line-height:1.55;
}
.pex span{
  display:block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--good);margin-bottom:4px;
}
@media(max-width:679px){.pex{font-size:.8rem;padding:9px 10px}}

/* ---------- quote meaning line ---------- */
.qmean{margin:8px 0 2px;font-size:.8rem;color:var(--text-soft);line-height:1.5}
.qmean span{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--qa,var(--brass));display:block;margin-bottom:2px}

/* ---------- font size setting ---------- */
html[data-fs="lg"]{font-size:17.5px}
html[data-fs="xl"]{font-size:19px}
/* ---------- bookmark stars ---------- */
.starbtn{position:absolute;top:10px;right:10px;color:var(--slate-dim);padding:6px;border-radius:8px;line-height:1;font-size:1.05rem;transition:color .2s,transform .15s;z-index:2}
.starbtn:hover{color:var(--brass)}
.starbtn.on{color:var(--brass-hi)}
.starbtn:active{transform:scale(.85)}
.quote{position:relative;padding-right:40px}
/* ---------- notes ---------- */
.notebox{width:100%;min-height:90px;resize:vertical;background:var(--well-3);border:1px solid var(--line-soft);border-radius:12px;color:var(--foam);padding:12px;font-family:'IBM Plex Sans',sans-serif;font-size:.9rem;line-height:1.55}
.notebox:focus{outline:none;border-color:var(--line)}
/* ---------- welcome ---------- */
.welcome-ic{font-size:1.9rem;margin-bottom:8px}
</style>
</head>
<body>

<header class="topbar">
  <div class="wordmark">
    <svg width="34" height="34" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <circle cx="20" cy="20" r="18.5" stroke="#C8A24E" stroke-width="1.4"/>
      <path d="M20 4 L22.4 17.6 L36 20 L22.4 22.4 L20 36 L17.6 22.4 L4 20 L17.6 17.6 Z" fill="#C8A24E" opacity=".9"/>
      <circle cx="20" cy="20" r="2.6" fill="#0B1322" stroke="#E8C97D" stroke-width="1.2"/>
    </svg>
    <div>
      <div class="wm-title">Master of Command</div>
      <div class="wm-sub">Leadership Academy</div>
    </div>
  </div>
  <button class="iconbtn" id="themeBtn" aria-label="Toggle day / night theme">
    <svg id="thIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5 5l1.7 1.7M17.3 17.3 19 19M19 5l-1.7 1.7M6.7 17.3 5 19"/></svg>
  </button>
  <button class="iconbtn" id="searchBtn" aria-label="Search">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
  </button>
</header>

<div class="layout">
  <nav class="rail" id="rail" aria-label="Main"></nav>
  <main id="main"></main>
</div>

<nav class="bnav" id="bnav" aria-label="Main"></nav>

<div class="overlay" id="overlay" role="dialog" aria-label="Search">
  <div class="searchbox">
    <input type="text" id="searchInput" placeholder="Search modules, scenarios, quotes…" autocomplete="off">
  </div>
  <div class="sresults" id="sresults"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================
   MASTER OF COMMAND — Maritime Leadership Academy
   Single-file PWA. Built for Chief Officers & Masters.
   ===================================================== */

/* ---------- safe storage (falls back to memory) ---------- */
const Store = (() => {
  let mem = {};
  let ok = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok = true; } catch(e){ ok = false; }
  return {
    get(k, d){ try { const v = ok ? localStorage.getItem(k) : mem[k]; return v == null ? d : JSON.parse(v); } catch(e){ return d; } },
    set(k, v){ try { if(ok) localStorage.setItem(k, JSON.stringify(v)); else mem[k] = JSON.stringify(v); } catch(e){} }
  };
})();

/* ---------- state ---------- */
const S = {
  xp: Store.get('moc_xp', 0),
  doneModules: Store.get('moc_modules', []),
  doneScenarios: Store.get('moc_scenarios', []),
  doneChallenges: Store.get('moc_challenges', []),
  badges: Store.get('moc_badges', []),
  crew: Store.get('moc_crew', []),
  lastVisit: Store.get('moc_lastVisit', null),
  streak: Store.get('moc_streak', 0),
  theme: Store.get('moc_theme', 'night'),
  simRuns: Store.get('moc_simRuns', {}),
  courseDays: Store.get('moc_courseDays', []),
  courseChecks: Store.get('moc_courseChecks', {}),
  doneCases: Store.get('moc_doneCases', []),
  notes: Store.get('moc_notes', {}),
  favQuotes: Store.get('moc_favQuotes', []),
  favPhrases: Store.get('moc_favPhrases', []),
  fontSize: Store.get('moc_fontSize', 'std'),
  drillDay: Store.get('moc_drillDay', null),
  seen: Store.get('moc_seen', false),
  xpLog: Store.get('moc_xpLog', {}),
  moduleDates: Store.get('moc_moduleDates', {}),
  reviews: Store.get('moc_reviews', {}),
  assessDone: Store.get('moc_assess', false),
  simsDone: Store.get('moc_sims', []),
  quotesSeen: Store.get('moc_qseen', 0)
};
function save(){
  Store.set('moc_xp', S.xp); Store.set('moc_modules', S.doneModules);
  Store.set('moc_scenarios', S.doneScenarios); Store.set('moc_challenges', S.doneChallenges);
  Store.set('moc_badges', S.badges); Store.set('moc_crew', S.crew);
  Store.set('moc_lastVisit', S.lastVisit); Store.set('moc_streak', S.streak);
  Store.set('moc_theme', S.theme); Store.set('moc_moduleDates', S.moduleDates); Store.set('moc_reviews', S.reviews);
  Store.set('moc_simRuns', S.simRuns);
  Store.set('moc_courseDays', S.courseDays); Store.set('moc_courseChecks', S.courseChecks); Store.set('moc_doneCases', S.doneCases);
  Store.set('moc_notes', S.notes); Store.set('moc_favQuotes', S.favQuotes); Store.set('moc_favPhrases', S.favPhrases); Store.set('moc_fontSize', S.fontSize); Store.set('moc_drillDay', S.drillDay); Store.set('moc_seen', S.seen); Store.set('moc_xpLog', S.xpLog);
  Store.set('moc_assess', S.assessDone); Store.set('moc_sims', S.simsDone);
  Store.set('moc_qseen', S.quotesSeen);
}

/* streak */
(function trackStreak(){
  const today = new Date().toDateString();
  if (S.lastVisit !== today) {
    const yest = new Date(Date.now() - 864e5).toDateString();
    S.streak = (S.lastVisit === yest) ? S.streak + 1 : 1;
    S.lastVisit = today; save();
  }
})();

/* ranks: signature progression */
const RANKS = [
  { name:'Deck Cadet', xp:0, stripes:0 },
  { name:'Third Officer', xp:120, stripes:1 },
  { name:'Second Officer', xp:300, stripes:2 },
  { name:'Chief Officer', xp:600, stripes:3 },
  { name:'Master', xp:1000, stripes:4 },
  { name:'Master Mariner — Commodore', xp:1600, stripes:4 }
];
function rankFor(xp){ let r = RANKS[0]; for (const k of RANKS) if (xp >= k.xp) r = k; return r; }
function nextRank(xp){ for (const k of RANKS) if (xp < k.xp) return k; return null; }
function leadershipScore(){
  const m = S.doneModules.length / MODULES.length;
  const sc = Math.min(1, S.doneScenarios.length / 24);
  const t = Math.min(1, (S.simsDone.length + (S.assessDone?1:0)) / 7);
  const ch = Math.min(1, S.doneChallenges.length / 14);
  return Math.round(20 + 80 * (m*0.4 + sc*0.3 + t*0.18 + ch*0.12));
}

function addXP(n, msg){
  const _d = Math.floor(Date.now()/864e5);
  S.xpLog[_d] = (S.xpLog[_d]||0) + n;
  S.xp += n; save(); checkBadges();
  toast((msg || 'Progress logged') + '  +' + n + ' XP');
}
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function dayIndex(mod){ const d = Math.floor(Date.now() / 864e5); return d % mod; }

/* =====================================================
   LEADERSHIP LIBRARY — 20 modules
   Synthesized from leadership, psychology, negotiation
   and maritime human-factors literature, adapted for
   Chief Officers and Masters.
   ===================================================== */
const MODULES = [
{ id:"command-presence", icon:"I", title:"Command Presence",
  summary:"Why some officers are obeyed before they speak — and how to build presence step by step.",
  intro:"Some officers walk on deck and the work gets better. They did not shout. They did not threaten. This power is called command presence. It is not magic and it is not in your genes. It is a set of habits. You can learn every one of them.",
  principles:[
   {t:"Calm is contagious — and so is panic",
    b:"The crew watches your face before they listen to your words. If you look calm, they stay calm. If you look scared, fear spreads in seconds. So your first job in any hard moment is simple: control your own body. Slow your breathing. Lower your voice. Stand still.",
    ex:"A mooring line parts during berthing. A weak officer screams and runs. A strong officer plants his feet, raises a hand, and says in a low voice: 'Stop heaving. All hands clear of the bight area. Bosun, report.' The deck copies his calm."},
   {t:"Preparation is presence",
    b:"Confidence is not acting. Real confidence comes from knowing the job cold. The officer who checked the plan, walked the deck, and thought about what can go wrong — that officer looks calm because he is ready. Most 'presence' is just homework done early.",
    ex:"Before cargo starts, you already know the sequence, the ballast plan, and the stress limits. When the foreman asks a hard question, you answer in five seconds. The crew sees it. Respect grows without one extra word."},
   {t:"Speak less, mean more",
    b:"Officers who talk all the time become background noise. Officers who speak rarely are heard clearly. Give short, clear orders. Do not explain everything twice. Do not fill silence with chatter. When your words are few, each word becomes heavy.",
    ex:"Instead of a five-minute speech about safety, you say one line at the toolbox talk: 'Nobody enters hold 4 before I test the atmosphere myself.' Everyone remembers it all day."},
   {t:"Control the first ten seconds",
    b:"People judge you very fast — in the first seconds of every meeting and every problem. Enter slowly. Greet people by name. Do not rush your first words. If a problem comes to you, pause two seconds before answering. That small pause says: this man is in control.",
    ex:"A panicked AB runs to you: 'Sir, water in the forepeak!' You pause, look at him, and say: 'Okay. Show me. Walk while you talk.' Your ten calm seconds stop his panic from spreading."},
   {t:"Never fake competence",
    b:"Presence dies the day the crew catches you bluffing. If you do not know something, say so — then find out fast. Saying 'I will check and tell you in ten minutes' is strong. Inventing an answer is weak, and the sea will expose it.",
    ex:"The Second Engineer asks about a deck crane limit you do not remember. You say: 'Good question. I will confirm from the manual and call you back.' Ten minutes later you call with the exact figure. Your stock goes up, not down."}
  ],
  onboard:[
   "Walk the deck every day with no clipboard. Just look, greet, and listen.",
   "Before every operation, prepare one level deeper than anyone expects.",
   "In any alarm or surprise, make your first action slow and your first words short.",
   "Practice your calm voice. The crew should never learn your panic voice exists."
  ],
  takeaway:"Presence is not volume or aggression. It is visible self-control plus visible competence, repeated every day until it becomes your reputation."},

{ id:"authority-vs-fear", icon:"II", title:"Authority vs Fear",
  summary:"Machiavelli asked: is it better to be feared or loved? On a ship, the real answer is: be respected.",
  intro:"Fear gets fast results and destroys everything slowly. A feared officer gets silence, hidden mistakes, and minimum work. A respected officer gets truth, effort, and loyalty. This module shows the difference — and how to build the second kind of power.",
  principles:[
   {t:"Fear works instantly and fails permanently",
    b:"Shout at a man and he obeys — today. But fear has a price. People stop telling you bad news. They hide small problems until the problems become big. They work only when you watch. Fear buys obedience and sells away the truth.",
    ex:"A Mate screams at an AB for reporting a hydraulic leak late. Next month, nobody reports the small leak in the steering gear. It is found by the PSC inspector instead."},
   {t:"Respect = fairness x competence x consistency",
    b:"Respect is built from three things. Fairness: same rules for every man, every nationality, every day. Competence: you know your job. Consistency: you are the same officer on Monday and on Friday, in port and at sea. If any one of the three is zero, respect is zero.",
    ex:"Two men make the same mistake. One is your countryman, one is not. You give both the same correction in the same tone. The whole crew notices within one day. That single moment builds more authority than ten speeches."},
   {t:"Be hard on standards, soft on people",
    b:"Never attack the person. Always defend the standard. You can correct a man firmly and still protect his dignity. The message is: the rule is solid like steel, but you are not my enemy. Crews accept hard standards from an officer who treats them like humans.",
    ex:"Wrong lashing on deck cargo. You do not say: 'Are you stupid?' You say: 'This lashing is wrong and it will not survive heavy weather. Redo it like this. Call me when done — I know you can do it right.'"},
   {t:"Never give an order you cannot enforce",
    b:"Every ignored order makes your next order weaker. So think before you speak. If you are not ready to follow up, do not give the order. Fewer orders, fully enforced, beat many orders half-forgotten.",
    ex:"You order: 'No phones on cargo watch.' Then you must actually check, every watch, and act when you find one. If you let it slide twice, the order is dead — and so is a piece of your authority."},
   {t:"Authority is loaned, respect is earned",
    b:"The company gives you rank. The crew gives you respect. Rank came with your contract and leaves with it. Respect follows you from ship to ship through the crewing grapevine. Build the thing that travels with you.",
    ex:"Ask any AB about the best Mate he ever sailed with. He will not mention certificates. He will say: 'He was fair. He stood up for us. He knew his job.' That is the asset worth building."}
  ],
  onboard:[
   "Audit yourself weekly: did I apply any rule differently to different people?",
   "When angry, delay the correction. Correct in private, calm, and specific.",
   "Count your orders for one day. Remove the ones you never check.",
   "Praise in public, correct in private — and do both with names and details."
  ],
  takeaway:"Fear is rented power with brutal interest. Respect is owned power. Choose the asset, not the loan."},

{ id:"psych-respect", icon:"III", title:"The Psychology of Respect",
  summary:"Respect follows clear psychological rules. Learn the rules and stop leaving it to luck.",
  intro:"Crews do not vote on respect in a meeting. They give it slowly, after watching a hundred small moments. The good news: those moments follow patterns. If you know what the crew is really testing, you can pass the tests on purpose.",
  principles:[
   {t:"The first test is always competence",
    b:"In the first week, the crew quietly checks one thing: does this officer know the job? They watch your cargo plan, your mooring orders, your seamanship. Pass this test and they listen. Fail it and nothing else you do will matter for months.",
    ex:"New Mate joins. On day two he finds an error in the stowage plan that the terminal missed. By day three, the whole deck crew knows the story. Test passed."},
   {t:"The second test is courage upward",
    b:"The crew watches how you act with people above you, not only below. Do you defend the crew when the office pushes too hard? Do you tell the Master uncomfortable truths politely? An officer who is brave only downward is called a bully. Brave upward — that earns deep respect.",
    ex:"The terminal pushes for an unsafe gangway arrangement. You refuse politely and arrange a safe one, even though it causes delay. An OS watched the whole thing. By dinner, the story has reached the engine room."},
   {t:"Consistency beats charisma",
    b:"A charming officer who changes mood every day loses to a boring officer who is the same every day. Crews need to predict you. Predictable standards feel safe. Safety feels like good leadership. You do not need to be impressive — you need to be steady.",
    ex:"For three months your morning meeting starts at 0800 sharp, takes ten minutes, and ends with clear jobs. Nothing dramatic. But the crew trusts the routine — and the man who runs it."},
   {t:"Small promises are the currency",
    b:"Respect is built mostly from small kept promises. 'I will check your overtime sheet today.' 'I will ask the office about your relief.' Each kept promise is a deposit. Each forgotten one is a withdrawal — and the crew keeps perfect accounts.",
    ex:"You tell an Oiler you will ask about his salary problem. You actually do it the same day and report back to him, even though the answer is 'still waiting'. He tells the engine room: this Mate does what he says."},
   {t:"Respect given is respect returned",
    b:"Greet the lowest-ranked man as politely as the highest. Learn names fast. Say thank you for hard jobs. Men who feel respected protect your authority for you. Men who feel invisible quietly work against it.",
    ex:"You always call the messman by name and thank him. Months later, in a crew dispute, voices defend you in the mess room when you are not there. That defense was bought with daily politeness."}
  ],
  onboard:[
   "In week one on any ship, win one visible technical problem. Make competence public.",
   "Write down every small promise you make. Close each one the same day if possible.",
   "Keep one standard routine the crew can set their watch by.",
   "Learn every name aboard within the first two weeks. Use them daily."
  ],
  takeaway:"Respect is not demanded. It is the verdict of a hundred small observed behaviors — so manage the behaviors."},

{ id:"crew-motivation", icon:"IV", title:"Crew Motivation",
  summary:"Why salary stops motivating after the contract is signed — and what really moves a tired crew.",
  intro:"Every man aboard signed for money. But money decided only why he came — not how hard he works today. Daily effort comes from other fuels: recognition, purpose, progress, and fairness. The officer controls all four.",
  principles:[
   {t:"Recognition is the cheapest fuel and the rarest",
    b:"Most seafarers can work for months and hear nothing except corrections. Specific praise changes that. Not just 'good job' — that is noise. Name exactly what was done well and why it mattered. Thirty seconds of real recognition can power a man for a week.",
    ex:"Instead of nothing, you say: 'Your re-lashing in hold 3 yesterday — you caught a real problem before the weather did. Good seamanship.' He repeats that sentence in his head all month."},
   {t:"Purpose beats pressure",
    b:"Pressure says: do it because I said. Purpose says: do it because it matters. Men work harder when they know why the job exists. Always attach the reason: this protects the cargo, this passes the vetting, this keeps your shipmates alive. Reasons turn tasks into missions.",
    ex:"Instead of 'sound all tanks today', you say: 'We had a small ballast discrepancy. I need exact soundings so we find it before it finds us.' The job is the same. The effort is not."},
   {t:"Progress must be visible",
    b:"People lose energy when work feels endless. Show progress. Break big jobs into stages. Mark what is finished. A crew that can see the wall of done work behind them pushes harder at the wall in front.",
    ex:"During a long hold-cleaning, you put a simple chart in the mess: holds done, holds left, days ahead of schedule. Crew starts checking it at lunch. Cleaning speed goes up without one extra order."},
   {t:"Fairness is the foundation — perceived fairness",
    b:"Real fairness is not enough. The crew must be able to see the fairness. Overtime, weekend jobs, shore leave — distribute them by a system everyone can check. A secret fair system looks unfair, and looking unfair does the same damage as being unfair.",
    ex:"You post the overtime rotation on the notice board. Now nobody wonders if the Bosun favors his cousins. Complaints about overtime drop to almost zero in two weeks."},
   {t:"Different men, different fuel",
    b:"One man works for his family. Another for pride. Another to learn and get promoted. Find what each man is working for, and connect his jobs to it. Motivating everyone the same way is like giving every engine the same fuel — some will run badly.",
    ex:"Your fitter dreams of becoming Bosun. You give him small leadership tasks: lead the painting team, brief the riggers. He starts working like a man on a mission — because now he is."}
  ],
  onboard:[
   "Give one piece of specific, named praise every single day.",
   "Attach a reason to every significant job order.",
   "Make progress visible on long jobs: simple charts, marked stages, milestones.",
   "Learn what each of your key men is personally working toward."
  ],
  takeaway:"You cannot order motivation. You can only build the conditions — recognition, purpose, progress, fairness — and then it grows by itself."},

{ id:"influence-without-orders", icon:"V", title:"Influencing Without Orders",
  summary:"The highest skill of command: getting things done when rank alone cannot reach.",
  intro:"Your rank only commands your own department. But your job needs the engine room, the galley, the agent, the terminal, and the office. With all of them, you must influence — not order. This skill also makes your own crew work better, because willing work beats commanded work.",
  principles:[
   {t:"Reciprocity runs the ship",
    b:"Help first, ask second. Humans feel a strong need to return favors. The officer who helps other departments without being asked builds a bank account of goodwill. Later, when he needs a favor at a bad hour, the account pays out.",
    ex:"You lend two ABs to help the engine room land a heavy spare part. A month later you need an urgent welding job on a Sunday. The Second Engineer says yes before you finish the sentence."},
   {t:"Let it be their idea",
    b:"People fight ideas pushed on them and defend ideas they think are their own. So plant seeds. Ask questions that lead to your answer. When the other man says your plan out loud, agree with him. You lose the credit and win the result. Take that trade every time.",
    ex:"You want the Bosun to change the painting sequence. Instead of ordering, you ask: 'If the weather turns Thursday, which side would you finish first?' He studies the forecast and proposes your plan. Now he owns it — and drives it hard."},
   {t:"Commitment grows from small yeses",
    b:"A man who agrees to something small is much more likely to agree to something bigger next. Start with easy requests. Each yes builds a self-image: I am the kind of man who helps this officer. Build the staircase one small step at a time.",
    ex:"A difficult AB refuses extra work. You start tiny: 'Just check this one lashing with me — two minutes.' He agrees. Next week he agrees to lead a small job. In a month he is one of your reliable hands."},
   {t:"Frame in their interest, speak their language",
    b:"Nobody is persuaded by your problems. They are persuaded by their own interests. Before asking, answer one question: what does this person gain? Time, safety, credit, less trouble? Lead with that gain. Then make the request.",
    ex:"You need the terminal to slow loading. You do not talk about your ballast pumps. You say: 'If we overload this sequence, we stop completely for three hours. If we slow ten percent now, you finish earlier overall.' The foreman hears his own interest — and agrees."},
   {t:"Social proof moves the fence-sitters",
    b:"Most people do what they see others doing. If the respected men follow a standard, the rest follow them. So do not fight every individual. Win the few men others copy — the senior AB, the Bosun, the popular Oiler — and let them carry the standard for you.",
    ex:"New helmet-chinstrap rule. You quietly get the Bosun and the senior AB to follow it visibly from day one. Within a week the whole deck follows. You corrected nobody."}
  ],
  onboard:[
   "Do one unasked favor for another department every week.",
   "Before requesting anything, write one sentence: what does the other person gain?",
   "Identify the three most copied men aboard. Invest in them first for every new standard.",
   "Practice asking guiding questions instead of giving conclusions."
  ],
  takeaway:"Rank moves subordinates. Influence moves everyone else — and moves subordinates better."},

{ id:"human-nature", icon:"VI", title:"Human Nature & Behavior",
  summary:"The operating manual nobody gives you: what people at sea really want, fear, and hide.",
  intro:"A ship is twenty-some humans locked in steel for months. To lead them, you need to know how humans actually work — not how they should work. These are the patterns that drive behavior aboard, taken from psychology and tested by every voyage.",
  principles:[
   {t:"Everyone protects their self-image first",
    b:"Every man carries a story: I am skilled, I am respected, I am a good seafarer. Attack that story and he will fight you — even against the facts, even against his own interest. Correct the work and protect the story, and he can change without losing face.",
    ex:"An experienced AB splices a wire wrongly. You do not say 'you do not know basic seamanship'. You say: 'A man with your experience — this is not your real standard. Show me your best version.' He redoes it perfectly, pride intact."},
   {t:"Envy wears a mask",
    b:"Envy almost never says its name. It dresses up as criticism, jokes, or sudden coldness. When someone attacks you strangely after your success, look for envy underneath. The cure is not to fight — it is to share credit and give the envious man his own way to shine.",
    ex:"After your promotion is announced, a fellow officer starts mocking small mistakes. Instead of war, you ask his advice publicly on a technical matter he knows well. The sniping fades — he got the recognition he was really hungry for."},
   {t:"Behavior under pressure is the true character",
    b:"Everyone is professional on a calm day. Character appears in heavy weather, port state inspections, and emergencies. Watch how men behave under pressure — who stays calm, who hides, who blames. Build your trust map from those moments, not from calm-water charm.",
    ex:"During a failed mooring approach, one normally quiet OS keeps his head, repeats orders clearly, and watches the bight. You mark him for bigger responsibilities. The talkative favorite who froze — you note that too."},
   {t:"People believe what they need to believe",
    b:"The mind is not a camera; it is a lawyer. It collects evidence for what it already wants to be true. A tired man believes the tank was already checked. A scared man believes the noise was nothing. Knowing this, build checks that do not depend on belief — verification, second looks, closed loops.",
    ex:"An AB is sure he closed the hatch access — he honestly believes it. It is open. You do not call him a liar. You add a rule: hatch closures are verified by a second man. Human nature is the reason; the system is the cure."},
   {t:"Status is the invisible cargo",
    b:"Humans track status constantly: who is respected, who was ignored, who got the better cabin, whose advice was taken. Small status injuries cause big quiet problems. Spend status deliberately — greetings, asking opinions, public thanks — especially on men with low rank and high pride.",
    ex:"The pumpman feels ignored in planning meetings. You start asking his opinion on every cargo line-up — he knows the lines best anyway. His attitude transforms. The problem was never workload; it was invisibility."}
  ],
  onboard:[
   "When correcting, separate the work from the man. Attack the gap, protect the face.",
   "Keep a private trust map based on pressure moments, not charm.",
   "Build verification systems that assume honest memory errors.",
   "Distribute small status — greetings, opinions asked, public thanks — every day."
  ],
  takeaway:"Crews are not machines with hands. They are status-sensitive, ego-protecting humans. Lead the human and the hands follow."},

{ id:"conflict-resolution", icon:"VII", title:"Conflict Resolution",
  summary:"Conflict on a ship has nowhere to go. Solve it early, with structure, and without creating losers.",
  intro:"Ashore, people in conflict can avoid each other. At sea they share a corridor, a mess room, and a watch schedule for months. Conflict aboard does not disappear — it goes underground and grows. The officer who solves conflict early and fairly protects the whole voyage.",
  principles:[
   {t:"Intervene at the grumble stage",
    b:"Every big conflict was once a small grumble. The cheap moment to act is at the start: a cold tone between two men, a seating change in the mess, jokes with teeth. Ask early, privately, gently. Solving a grumble costs ten minutes. Solving a war costs a voyage.",
    ex:"You notice two ABs stop sitting together and work in silence. You ask one of them casually during a deck round: 'You two okay? Something about the overtime list?' Ten minutes of listening kills a feud before it is born."},
   {t:"Separate positions from interests",
    b:"A position is what a man demands. An interest is why he demands it. Positions often clash when interests do not. 'I want his cabin' may really mean 'I want to be treated as senior'. You cannot satisfy both positions — but you can often satisfy both interests.",
    ex:"Two men both demand the same day of shore leave. Positions clash. You ask why. One needs to call his bank when it is open; the other wants to meet a relative arriving by evening. Morning leave for one, evening for the other. Both interests met."},
   {t:"Hear both, separately, first",
    b:"Never judge a conflict in front of both parties before hearing each alone. Separately, men speak honestly. Together, they perform for the audience and defend their pride. Listen to each story, take notes, find the facts both agree on — then bring them together.",
    ex:"Galley conflict: cook versus messman. You meet each one alone for ten minutes. Alone, the messman admits his own part. In a joint meeting, that admission would never have come."},
   {t:"Make the future the deliverable, not the verdict",
    b:"Crews do not need you to announce who was right. They need to work together tomorrow. Spend a little time on what happened and most of the time on what happens next. The product of mediation is a specific working agreement, not a court judgment.",
    ex:"After a watch-handover dispute, you do not declare a winner. You make a rule both sign: handovers follow the checklist verbally, both initial the log, problems come to you the same day. The war ends because the future is now defined."},
   {t:"Some conflicts are structural — fix the structure",
    b:"When the same conflict repeats with different people, the problem is not the people. Look for the broken structure: unclear duty boundaries, an unfair rotation, two men ordered by two bosses. Fix the structure and the conflicts stop appearing.",
    ex:"Every voyage, deck and engine fight about who maintains the crane. The men change; the fight remains. You write one line in the planned maintenance system defining the split. Three voyages later, the famous fight has never returned."}
  ],
  onboard:[
   "Walk the mess room and the deck daily. Conflicts show in seating and silence first.",
   "In any dispute, ask why behind every demand. Hunt the interest.",
   "Always interview separately before mediating jointly.",
   "If a conflict repeats, write down the structural cause and fix that instead."
  ],
  takeaway:"On a ship, every conflict becomes your conflict eventually. The cheapest moment to solve it is always now."},

{ id:"difficult-crew", icon:"VIII", title:"Managing Difficult Personalities",
  summary:"The know-it-all, the sea-lawyer, the silent resister, the prima donna — a field guide with instructions.",
  intro:"Most crew members are reasonable. A few are not — and those few eat your time and energy. The trick is to stop treating each difficult man as a mystery. Difficult people come in patterns. Learn the pattern, and you know the handle.",
  principles:[
   {t:"The Sea-Lawyer: remove his audience",
    b:"The sea-lawyer argues every rule and quotes every contract clause — but only when others are watching. The performance needs a public. So never debate him on deck. Move every discussion to your office, one to one, with the document open. Without an audience, half the fight disappears.",
    ex:"An AB challenges the overtime rules loudly at the gangway. You say calmly: 'Good question. My office, 1300, we will read the CBA together.' At 1300, alone with the actual text, he is reasonable in ten minutes."},
   {t:"The Veteran Know-It-All: convert, do not crush",
    b:"The veteran corrects everyone, including you, because his knowledge is his identity. Crushing him publicly turns him into an enemy with allies. Instead, give that knowledge an official job: mentor of cadets, leader of a survey, your adviser on a topic he truly knows. Pride becomes fuel.",
    ex:"The old pumpman argues with every line-up. You make him the official trainer for new ratings on the cargo system. The arguing stops — the same energy now flows into teaching."},
   {t:"The Silent Resister: make the implicit explicit",
    b:"This man never argues. He just somehow never does the job — slow, forgotten, half-done. Silence is his weapon, so make everything spoken and written. Specific task, specific deadline, confirmed back in his words. Vague orders are oxygen for silent resistance; precision suffocates it.",
    ex:"Instead of 'sort out the paint locker sometime', you say: 'Paint locker arranged by Thursday 1600. Tell me your plan now in one minute.' He must speak his commitment out loud. Now silence cannot protect the delay."},
   {t:"The Prima Donna: pay the price you choose",
    b:"The talented difficult man trades on being special: best crane driver, best welder. Pay him in his real currency — recognition and interesting work — but set the price publicly: same rules as everyone. The deal is simple: your skill earns respect, not exemptions.",
    ex:"Your best crane operator starts ignoring the helmet rule. You tell him privately: 'You are the best driver here, and the crew copies the best. That is why your standard has to be perfect.' Status confirmed, rule restored."},
   {t:"The Chronic Victim: sympathy once, structure after",
    b:"For this man, nothing is ever his fault — the tools, the weather, the others. Hear him fully once, with respect. After that, respond to every complaint with structure: write it down, propose a fix, give him a role in fixing it. Victims either become problem-solvers or run out of complaints.",
    ex:"He complains again that his watch gets the worst jobs. You say: 'Write the last two weeks of jobs by watch and bring it tomorrow. If the data shows imbalance, I will fix it.' The data shows balance. The complaint retires."}
  ],
  onboard:[
   "Name the pattern privately before reacting: lawyer, veteran, resister, prima donna, victim.",
   "Move every recurring argument off the deck and into the office.",
   "Give difficult talent an official channel for its pride.",
   "Make all tasks for passive men specific, spoken back, and written."
  ],
  takeaway:"Difficult people are puzzles with patterns. Read the pattern, choose the handle — and never let one personality consume the leadership the other twenty deserve."},

{ id:"lazy-crew", icon:"IX", title:"Handling Underperformance & Laziness",
  summary:"Before calling a man lazy, rule out four other explanations. Then act with structure, not anger.",
  intro:"'He is lazy' feels like a diagnosis. Usually it is a guess. Real laziness exists, but it is the last explanation, not the first. Check the other causes first — then, if it truly is unwillingness, act firmly and document everything.",
  principles:[
   {t:"First, audit your own clarity",
    b:"Half of all 'laziness' is an unclear order. Did the man know exactly what to do, to what standard, by when? If not, the failure is yours. Before any correction, repeat the order in your head: was it specific enough that two people would understand it the same way?",
    ex:"You told an OS to 'tidy the bosun store'. He moved some ropes. You expected a full re-stow with labels. The gap was in the order, not the man. Next time: 'Re-stow by type, label each shelf, photo to me by 1600.'"},
   {t:"Distinguish cannot from will not",
    b:"Cannot means missing skill, missing tools, or missing time. Will not means choice. They look identical from the bridge wing and need opposite cures: training fixes cannot; consequences fix will not. Ask, watch, and test before you choose your tool.",
    ex:"A new AB does slow, bad chipping work. Watching him for five minutes shows he was never taught to use the tool properly. Ten minutes of teaching transforms his output. Discipline would have ruined him for nothing."},
   {t:"Check the body before the character",
    b:"Fatigue, illness, and worry look exactly like laziness. A man sleeping badly because of a family problem at home, or sick and hiding it, will underperform. Ask about the man before judging the worker. Sometimes the fix is a rest day, not a warning.",
    ex:"Your most reliable AB suddenly becomes slow and careless. A private question reveals his mother is in hospital and he has barely slept for a week. You adjust his duties for a few days. The 'laziness' disappears with the crisis."},
   {t:"Confront with the gap, not the judgment",
    b:"Never open with 'you are lazy' — that attacks identity and triggers war. Open with the gap: here is the standard, here is what happened, explain the difference to me. Facts invite explanation. Judgments invite defense.",
    ex:"Instead of 'your work ethic is poor', you say: 'The job was four hours, standard quality. It took two days and I found these three defects. Walk me through what happened.' Now the conversation is about evidence."},
   {t:"Protect the workers from the shirkers",
    b:"When one man underperforms without consequence, your best men pay the bill — they do his share. Let it continue and the good men learn the worst lesson aboard: effort is optional. Acting on underperformance is not cruelty to one man; it is justice for nineteen.",
    ex:"One AB skips heavy jobs and the Bosun quietly reroutes work to the strong ones. You see it, intervene, and put the load back with documented expectations. Watch the mood of your best men improve within days."}
  ],
  onboard:[
   "Before correcting, check the four other causes: clarity, ability, health, system.",
   "Watch the man actually work before deciding cannot versus will not.",
   "Confront with documented gaps: standard, actual, dates, evidence.",
   "Track who silently absorbs the unfinished work — and relieve them."
  ],
  takeaway:"Diagnose before you discipline. But once the diagnosis says will-not, act, document, and never let the willing carry the unwilling."},

{ id:"toxic-crew", icon:"X", title:"Handling Toxic Crew Members",
  summary:"One toxic man can poison a 20-man crew. Recognition, containment, removal — in that order.",
  intro:"A toxic crew member is different from a difficult one. Difficult costs you patience. Toxic costs you the crew: morale drops, factions form, good men ask for early sign-off. This module is about spotting the poison early and stopping it with procedure, not emotion.",
  principles:[
   {t:"Know the signature: triangulation",
    b:"The toxic man rarely attacks openly. He works through triangles: tells A something bad about B, tells B something twisted about A, and watches the fire. If conflicts keep appearing between people with one common friend — look at the friend. That pattern is the signature.",
    ex:"Three separate deck conflicts in a month. Different men each time, but the same AB was the one 'who heard what the other guy said'. The conflicts were manufactured. You have found the source."},
   {t:"Cut the information supply",
    b:"Toxic men feed on information — complaints they can carry, secrets they can twist. Starve the supply. Be careful what you say near them. Brief the crew directly and completely so there is nothing for the middle-man to distort. Rumors die when facts arrive first.",
    ex:"Schedule changes used to leak through mess-room rumor, always with a poisonous spin. Now you announce changes yourself, same day, with reasons. The toxic carrier has nothing left to deliver."},
   {t:"Confront with evidence, expect denial",
    b:"Confronting toxicity with feelings fails — he will deny, cry injustice, and claim to be the victim. Confront only with documented facts: dates, words, witnesses, consequences. Stay calm, keep it formal, and put it in writing. The message: the game has been seen and recorded.",
    ex:"You confront not with 'people say you cause trouble', but with: 'On these three dates you told X these specific things. Here are the statements. This stops now, and this conversation is documented.'"},
   {t:"Protect the targets visibly",
    b:"Toxic men pick targets — often the quiet, the new, the foreign. The crew watches whether you protect them. Visible protection does two jobs: it shields the victim and tells everyone the climate has an owner. Silence from you reads as permission.",
    ex:"A new cadet is the butt of increasingly cruel 'jokes' from one rating. You shut it down in front of the same audience that watched the jokes: 'That ends now. He is here to learn, and this ship teaches.' The deck takes note."},
   {t:"Removal is sometimes the only maintenance",
    b:"Some toxicity cannot be repaired aboard. When containment fails and the damage continues, work the system: documentation, Master, DPA, office, and repatriation if needed. One difficult crew change is cheaper than a poisoned voyage — pay the price early.",
    ex:"After two formal warnings and continued sabotage of crew relations, you compile the file and the Master requests a relief in the next port. Within a week of his departure, the mess room is loud and friendly again. Twenty men exhale."}
  ],
  onboard:[
   "When conflicts multiply, map who is connected to all of them.",
   "Deliver important information yourself, fast and complete, to kill the rumor market.",
   "Document toxic incidents from the first one — dates, words, witnesses.",
   "Check on likely targets weekly: the quiet, the new, the isolated."
  ],
  takeaway:"Tolerating toxicity to avoid one hard conversation is choosing twenty quiet resignations instead."},

{ id:"negotiation", icon:"XI", title:"Negotiation Skills",
  summary:"Tactical empathy, anchoring, and trading — negotiation as a daily deck skill.",
  intro:"Officers negotiate every day: with terminals about rates, with agents about timing, with the office about spares, with crew about disputes. Negotiation is not a fight. It is joint problem-solving between people with different information. These rules win it.",
  principles:[
   {t:"He who cares most, loses most",
    b:"Desperation is expensive. The side that visibly needs the deal accepts worse terms. So build alternatives before you negotiate: another option, more time, a fallback plan. You do not need to hide interest — only desperation. Calm patience is negotiating power.",
    ex:"Chandler quotes a crazy price for urgent provisions, sensing pressure. You reply: 'We can also top up at the next port in four days.' The price drops twenty percent in one phone call — because your alternative was real."},
   {t:"Tactical empathy: label, do not argue",
    b:"When the other side is angry or pushing, do not push back with logic first. Name their feeling out loud: 'It sounds like the schedule has put you under real pressure.' Labeling makes people feel understood — and understood people stop fighting and start talking. It costs you nothing and concedes nothing.",
    ex:"The foreman storms aboard about delays. You say: 'It seems like your boss is on your back about the berth window.' He deflates, says 'exactly', and within five minutes you are solving the problem together instead of trading blame."},
   {t:"No is the beginning, not the end",
    b:"Most people fear hearing no and stop. But no usually means: not this version, not yet, not without changes. Treat no as information. Ask what part does not work. Behind almost every no is a smaller yes waiting to be found.",
    ex:"The office says no to your full deck-machinery overhaul budget. Instead of giving up, you ask which part is the problem. The answer: total cost this quarter. You split the job over two quarters. Approved."},
   {t:"Anchor first when you know the range",
    b:"The first number spoken pulls the whole negotiation toward it — that is anchoring. If you know the realistic range, speak first and anchor high (or low) but defendable. If you do not know the range, stay quiet and let the other side reveal it.",
    ex:"You know hold cleaning by shore labor costs 4000 to 6000 dollars in this port. You open at 3800 with a straight face. The deal closes at 4400 — below the midpoint, pulled there by your anchor."},
   {t:"Trade, never donate",
    b:"Every concession you give free teaches the other side to push harder. So attach a string to every give: if you extend laytime, you want a faster gang; if you accept their sequence, you want their crane priority. The word 'if' is the most profitable word in negotiation.",
    ex:"Terminal wants to start two hours early. You do not just say yes. You say: 'We can be ready early if you commit both gangs from start.' One small if converts your flexibility into their commitment."},
   {t:"Calibrated questions do the heavy lifting",
    b:"Questions starting with how and what make the other side solve your problem. 'How am I supposed to accept this rate?' 'What would make this work for both of us?' They cannot be answered with no, they force thinking, and they hand the other side ownership of the solution.",
    ex:"Agent pressures you to sail before stores arrive. You ask: 'How do we explain to the charterer if we sail without mandatory safety stores?' Silence. Then he finds a faster delivery truck. Your question did the negotiating."}
  ],
  onboard:[
   "Before every negotiation, write your walk-away alternative on paper.",
   "Practice one label per day: it sounds like, it seems like.",
   "Never accept or refuse instantly; ask one calibrated question first.",
   "Attach an if to every concession this month and watch the results."
  ],
  takeaway:"Negotiation is joint problem-solving with unequal information. Prepare harder, listen louder, and trade — never donate."},

{ id:"inspection-leadership", icon:"XII", title:"Inspection & Audit Leadership",
  summary:"PSC, vetting, ISM audits: the inspection is of the ship, but the inspector is reading the officers.",
  intro:"Inspectors see hundreds of ships. Within minutes they form a feeling: is this ship controlled or chaotic? That feeling decides how deep they dig. Paperwork matters, spaces matter — but the inspector is mostly reading the officers. This module is about passing the human inspection.",
  principles:[
   {t:"The gangway is the first finding",
    b:"The inspection starts before any certificate is opened. The gangway watch, the visitor log, the first phone call, the walk to the office — every detail is evidence of a controlled or careless ship. A sharp first ten minutes can soften the next four hours.",
    ex:"The PSC officer arrives. The watchman checks his ID, issues a visitor card, calls the duty officer immediately, and escorts him properly. The inspector has already written 'good shipboard control' in his head before reaching the deck office."},
   {t:"Confidence without defensiveness",
    b:"Two attitudes fail with inspectors: fear and arrogance. Fear smells like hidden problems; arrogance invites a hunt. The winning posture is calm cooperation: answer directly, show documents without hesitation, and treat the inspector as a professional doing his job — because he is.",
    ex:"Inspector questions your enclosed-space records. You open the file at once, walk him through the last entry, and offer the gas meter calibration certificate before he asks. Nothing to defend, nothing to hide. He moves on quickly."},
   {t:"Prepare the crew mouths, not just the spaces",
    b:"Inspectors ask ratings questions: what is your muster station, how do you launch the rescue boat, what does this permit mean. A clean ship with confused crew fails. Before inspections, drill the questions. Every man should answer about his own duties simply and confidently.",
    ex:"Before vetting, you run a quick round: each AB explains his lifeboat duty in one minute. During the inspection, the vetting inspector asks an OS exactly that. The smooth answer is worth more than a fresh coat of paint."},
   {t:"Escort actively, manage the route",
    b:"Never let an inspector wander alone. Escort with purpose: lead the route through your strengths, answer before small things become questions, and take immediate notes of every comment. An active escort shapes the inspection; a passive one just watches it happen.",
    ex:"Walking aft, you steer past the freshly completed crane survey and mention it. You note his small comment about a corroded stanchion and order the fix during the inspection itself. He sees correction in real time — and writes fewer findings."},
   {t:"The closing meeting shapes the findings",
    b:"Findings are not final until written. The closing meeting is a negotiation: clarify misunderstandings politely, show evidence that corrects errors, and get hopeless points downgraded to observations where facts allow. Argue with documents, never with emotion — and accept fair findings gracefully.",
    ex:"Inspector lists a deficiency about a missing drill record. You produce the record from the other logbook where it legitimately lives. The deficiency becomes a no-finding. Five quiet minutes in the closing meeting saved a PSC record entry."}
  ],
  onboard:[
   "Run the gangway like every visitor is an inspector — because one day he is.",
   "Drill crew question-and-answer before every expected inspection.",
   "Always escort actively; carry a notebook and fix small items in real time.",
   "Prepare a clean closing-meeting file: recent corrections, surveys, evidence."
  ],
  takeaway:"Inspectors assess the command climate through a porthole of details. Run a controlled ship daily and the inspection becomes a demonstration, not an examination."},

{ id:"crisis-leadership", icon:"XIII", title:"Crisis Leadership",
  summary:"When the alarm sounds, the crew does not rise to the occasion — it falls to its training, and looks at you.",
  intro:"In an emergency, thinking gets narrow, hands shake, and people copy the leader. Whatever you do in the first sixty seconds, the crew multiplies. Crisis leadership is not heroism. It is preparation, sequence, and a calm voice — decided long before the alarm.",
  principles:[
   {t:"First, command yourself",
    b:"Your body panics before your brain does: fast heart, fast voice, tunnel vision. The fix is physical. Breathe out slowly. Drop your shoulders. Speak at half your urge speed. You cannot stop the adrenaline, but you can refuse to broadcast it — and the crew reads only the broadcast.",
    ex:"Fire alarm, engine room. Walking to the muster station, you deliberately slow your steps and lower your voice on the radio. The crew arriving at stations hears a calm channel — and matches it."},
   {t:"Prioritize brutally: people, ship, cargo, schedule",
    b:"Crisis floods you with demands at once. The order never changes: people first, then the ship, then the cargo, then the schedule. Any decision that protects a lower priority by risking a higher one is wrong. Say the order out loud when pressure mounts — it cuts through noise.",
    ex:"Flooding in a hold with cargo damage spreading. The office calls about the ETA. You assign the ETA question to later without guilt: 'People and ship first. Schedule when this is stable.' The sequence makes the decision for you."},
   {t:"Push information up, decisions down",
    b:"The bridge needs the picture; the scene needs authority. Keep reports flowing upward — short, factual, regular. Push decisions downward to the man on the spot who sees the actual fire, the actual water. Hoarding decisions at the top loses minutes that the scene does not have.",
    ex:"At the fire scene, the Second Engineer wants to change boundary cooling. Instead of describing everything by radio and waiting, you have pre-agreed: scene leader decides tactics, reports every five minutes. He acts in seconds, you stay informed."},
   {t:"Closed-loop or it did not happen",
    b:"In crisis, half-heard orders kill. Every instruction must come back confirmed in the receiver own words: 'Stop ballast pump two' — 'Stopping ballast pump two.' No echo, no execution assumed. The loop feels slow and saves lives; assumptions feel fast and sink ships.",
    ex:"You order isolation of a fuel valve. The reply is just 'okay'. You insist: 'Repeat back which valve.' He repeats the wrong valve number. The closed loop just prevented a second emergency."},
   {t:"Plan the next two moves while executing this one",
    b:"Crews handle the current step; the leader owns the future. While the team fights this fire, you are already asking: what if it spreads, what do I stage now, what does the next hour need? Staying two moves ahead is what makes your next order ready when the moment comes.",
    ex:"Boundary cooling is holding. While it holds, you already muster the foam team, prepare the next hose run, and draft the position report. When the situation shifts ten minutes later, your response begins instantly — it was already staged."}
  ],
  onboard:[
   "Train your crisis voice in drills: slower, lower, shorter.",
